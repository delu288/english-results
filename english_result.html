<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>English Result - መምህር ደለለኝ</title>
    <style>
        body { font-family: 'Nyala', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; border-top: 8px solid #3498db; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; text-align: center; outline: none; }
        input:focus { border-color: #3498db; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; }
        button:hover { background: #2980b9; }
        #res { margin-top: 25px; text-align: left; display: none; padding: 20px; border-radius: 12px; background: #f9f9f9; border-left: 6px solid #2ecc71; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .res-row { margin-bottom: 10px; font-size: 18px; }
        .label { font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="box">
    <div style="font-size: 50px; margin-bottom: 10px;">📚</div>
    <h2>የውጤት መፈለጊያ</h2>
    <p style="color: #666;">መለያ ቁጥርዎን (ID) ያስገቡ</p>
    <input type="number" id="idInput" placeholder="ለምሳሌ፡ 1">
    <button onclick="search()">ውጤት አሳይ</button>
    <div id="res"></div>
</div>

<script>
    // መምህር ደለለኝ የሰጡኝ የተማሪዎች መረጃ
    const studentData = [
        { id: "1", name: "አቤል ወርቁ", score: "99", rank: "2ኛ", comment: "Keep it up!" },
        { id: "2", name: "ናታን አንድነት", score: "100", rank: "1ኛ", comment: "Great job!" },
        { id: "3", name: "አሜን ተክሌ", score: "98", rank: "3ኛ", comment: "Smart!" },
        { id: "4", name: "ገነት ፍርዴ", score: "98", rank: "3ኛ", comment: "Smart!" },
        { id: "5", name: "ባሮክ ዲቤ", score: "67", rank: "5ኛ", comment: "Good!" }
    ];

    function search() {
        const id = document.getElementById('idInput').value.trim();
        const resDiv = document.getElementById('res');
        
        const student = studentData.find(s => s.id === id);

        resDiv.style.display = "block";

        if (student) {
            resDiv.innerHTML = `
                <div class="res-row"><span class="label">ስም፦</span> ${student.name}</div>
                <div class="res-row"><span class="label">ውጤት፦</span> <b style="color:#2ecc71">${student.score}%</b></div>
                <div class="res-row"><span class="label">ደረጃ፦</span> ${student.rank}</div>
                <div class="res-row" style="border-top: 1px solid #ddd; padding-top: 10px; margin-top: 10px;">
                    <span class="label">የመ/ር አስተያየት፦</span> <br>
                    <i style="color:#3498db">"${student.comment}"</i>
                </div>
            `;
        } else {
            resDiv.innerHTML = "<b style='color:#e74c3c;'>ይቅርታ፣ መለያ ቁጥር " + id + " አልተገኘም!</b>";
        }
    }
</script>
</body>
</html>
