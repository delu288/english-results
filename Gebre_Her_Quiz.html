<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የገብር ኄር መጠይቅ ከቪዲዮ ጋር</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #27ae60;
            --accent-color: #f39c12;
            --bg-color: #ecf0f1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            max-width: 800px;
            width: 100%;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: var(--primary-color); text-align: center; }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 30px;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .question-card {
            background: #f9f9f9;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--secondary-color);
            border-radius: 5px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .option-btn {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-size: 16px;
        }
        .option-btn:hover { background: #e8f4fd; border-color: #3498db; }
        .correct { background-color: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b; }
        #score-display {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            color: var(--primary-color);
            display: none;
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>የአቢይ ጾም 6ኛ ሳምንት፡ ገብር ኄር</h1>
    
    <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
    </div>

    <div id="quiz-area">
        <div class="question-card" data-correct="1">
            <p><strong>1. የአቢይ ጾም ስድስተኛ ሳምንት "ገብር ኄር" የሚባለው በምን ምክንያት ነው?</strong></p>
            <div class="options">
                <button class="option-btn" onclick="check(this, 0)">ሀ. ጾሙ ግማሽ ላይ ስለደረሰ</button>
                <button class="option-btn" onclick="check(this, 1)">ለ. ጌታችን ስለ ታማኝ አገልጋይ ያስተማረበት ሳምንት ስለሆነ</button>
                <button class="option-btn" onclick="check(this, 2)">ሐ. ስለ ቅዱሳን ሰማዕታት የሚታሰብበት ስለሆነ</button>
            </div>
        </div>

        <div class="question-card" data-correct="1">
            <p><strong>2. በመክሊት ምሳሌ መሠረት፣ አምስት መክሊት የተቀበለው አገልጋይ ስንት አተረፈ?</strong></p>
            <div class="options">
                <button class="option-btn" onclick="check(this, 0)">ሀ. አንድ መክሊት</button>
                <button class="option-btn" onclick="check(this, 1)">ለ. አምስት መክሊት</button>
                <button class="option-btn" onclick="check(this, 2)">ሐ. አሥር መክሊት</button>
            </div>
        </div>

        <div class="question-card" data-correct="2">
            <p><strong>3. አንድ መክሊት የተቀበለው አገልጋይ መክሊቱን ምን አደረገው?</strong></p>
            <div class="options">
                <button class="option-btn" onclick="check(this, 0)">ሀ. ነገደበት</button>
                <button class="option-btn" onclick="check(this, 1)">ለ. ለድሆች ሰጠው</button>
                <button class="option-btn" onclick="check(this, 2)">ሐ. ምድርን ቆፍሮ ቀበረው</button>
            </div>
        </div>

        <div class="question-card" data-correct="0">
            <p><strong>4. ጌታችን ታማኝ አገልጋዮቹን ሲያመሰግናቸው ምን አላቸው?</strong></p>
            <div class="options">
                <button class="option-btn" onclick="check(this, 0)">ሀ. "በጥቂቱ የታመንህ በብዙ እሾምሃለሁ"</button>
                <button class="option-btn" onclick="check(this, 1)">ለ. "ሄደህ ለድሆች ስጥ"</button>
                <button class="option-btn" onclick="check(this, 2)">ሐ. "ዕረፍት አድርጉ"</button>
            </div>
        </div>

        <div class="question-card" data-correct="1">
            <p><strong>5. የገብር ኄር ሳምንት ለክርስቲያኖች የሚያስተላልፈው ዋና መልዕክት ምንድን ነው?</strong></p>
            <div class="options">
                <button class="option-btn" onclick="check(this, 0)">ሀ. ስለ ንግድ ጥበብ መማር</button>
                <button class="option-btn" onclick="check(this, 1)">ለ. የተሰጠንን ጸጋና ኃላፊነት በትጋት መጠቀም</button>
                <button class="option-btn" onclick="check(this, 2)">ሐ. ከሰው መደበቅ</button>
            </div>
        </div>
    </div>

    <div id="score-display"></div>
    <button class="btn-submit" onclick="showFinalScore()">ውጤቴን አሳይ</button>
</div>

<script>
    let correctCount = 0;
    let answeredQuestions = new Set();

    function check(btn, index) {
        const card = btn.closest('.question-card');
        const correctIndex = parseInt(card.getAttribute('data-correct'));
        const questionId = card.innerHTML;

        if (answeredQuestions.has(questionId)) return;

        const allButtons = card.querySelectorAll('.option-btn');
        if (index === correctIndex) {
            btn.classList.add('correct');
            correctCount++;
        } else {
            btn.classList.add('wrong');
            allButtons[correctIndex].classList.add('correct');
        }

        answeredQuestions.add(questionId);
    }

    function showFinalScore() {
        const total = document.querySelectorAll('.question-card').length;
        const display = document.getElementById('score-display');
        display.style.display = 'block';
        display.innerHTML = `ውጤትዎ፡ ${total} ውስጥ ${correctCount} አግኝተዋል!`;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
