<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ውጤት ማሳወቂያ - ጣይቱ ብጡል አካዳሚ</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; border-top: 10px solid #2c3e50; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .field { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #0077b5; }
    </style>
</head>
<body>

<div class="container">
    <h2>ጣይቱ ብጡል አካዳሚ</h2>
    <p style="text-align:center;">መ/ር ደለለኝ አጥላው - እንግሊዝኛ</p>
    <hr>

    <form id="resultForm">
        <div class="field">
            <label>የተማሪው ሙሉ ስም</label>
            <input type="text" id="name" required>
        </div>
        <div class="field">
            <label>ክፍል</label>
            <input type="text" id="grade" placeholder="ለምሳሌ፡ 6A">
        </div>
        <div class="field">
            <label>ውጤት</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="score" style="flex:2;" required>
                <select id="scale" style="flex:1;">
                    <option value="10%">ከ 10%</option>
                    <option value="20%">ከ 20%</option>
                    <option value="40%">ከ 40%</option>
                    <option value="100%">ከ 100%</option>
                </select>
            </div>
        </div>
        <div class="field">
            <label>የመምህሩ አስተያየት</label>
            <textarea id="t_comment" rows="2"></textarea>
        </div>
        <div class="field">
            <label style="color:green;">የወላጅ አስተያየት</label>
            <textarea id="p_comment" rows="2" placeholder="ወላጆች እዚህ ይፃፉ..."></textarea>
        </div>
        <button type="button" class="btn" onclick="sendToTelegram()">አስተያየትና ውጤት ላክ</button>
    </form>
</div>

<script>
    function sendToTelegram() {
        const token = "YOUR_BOT_TOKEN"; // 8608778734:AAGQpZ3yKghv7HQJxjo7SJVH6WqH5-Y5JD4
        const chat_id = "YOUR_CHAT_ID"; // 7387771308
        
        const name = document.getElementById('name').value;
        const grade = document.getElementById('grade').value;
        const score = document.getElementById('score').value;
        const scale = document.getElementById('scale').value;
        const t_comment = document.getElementById('t_comment').value;
        const p_comment = document.getElementById('p_comment').value;

        const message = `📩 **አዲስ የውጤት መረጃ**\n\n` +
                        `👤 ተማሪ፦ ${name}\n` +
                        `🏫 ክፍል፦ ${grade}\n` +
                        `📊 ውጤት፦ ${score}/${scale}\n` +
                        `👨‍🏫 መምህር፦ ${t_comment}\n` +
                        `👪 ወላጅ፦ ${p_comment}`;

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

        fetch(url).then(response => {
            if(response.ok) {
                alert("መረጃው በተሳካ ሁኔታ ወደ መምህሩ ተልኳል!");
                document.getElementById('resultForm').reset();
            } else {
                alert("መረጃው አልተላከም፣ እባክዎ በድጋሚ ይሞክሩ።");
            }
        });
    }
</script>

</body>
</html>
