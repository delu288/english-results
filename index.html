<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የጥያቄና መልስ ውጤት መያዣ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 10px; font-size: 13px; }
        
        /* Login Box ዲዛይን */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a73e8; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 300px;
        }
        .login-box input {
            width: 80%; padding: 10px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; text-align: center; font-size: 16px;
        }
        .login-box button {
            padding: 10px 30px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        /* ዋናው ይዘት መጀመሪያ ተደብቆ ይቆያል */
        #main-content { display: none; } 

        .container { max-width: 1250px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        
        .timer-container { text-align: center; margin-bottom: 20px; background: #fff; border: 2px solid #1a73e8; padding: 15px; border-radius: 50px; display: inline-block; position: relative; left: 50%; transform: translateX(-50%); }
        #timer-display { font-size: 2.5rem; font-weight: bold; color: #d93025; border: none; background: transparent; text-align: center; width: 120px; outline: none; }
        .timer-btn { padding: 8px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; margin: 0 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #dadce0; padding: 8px; text-align: center; }
        th { background-color: #1a73e8; color: white; }
        .touch-cell { cursor: pointer; font-size: 18px; font-weight: bold; width: 40px; height: 35px; min-width: 35px; }
        .status-none { background: #fff; }
        .status-right { background: #e6f4ea; color: #1e8e3e; }
        .status-wrong { background: #fce8e6; color: #d93025; }

        .action-btn { padding: 10px 25px; border-radius: 5px; border: none; color: white; cursor: pointer; font-weight: bold; margin: 5px; }

        @media print {
            .final-actions, .timer-container, .add-row-btn, #login-overlay { display: none !important; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h3>የውጤት መያዣ</h3>
        <p>እባክዎ የይለፍ ቃል ያስገቡ</p>
        <input type="password" id="pass-input" placeholder="Password...">
        <br>
        <button onclick="checkPass()">ግባ</button>
    </div>
</div>

<div id="main-content">
    <div class="container">
        <h2>የጥያቄና መልስ ውድድር ውጤት መያዣ</h2>

        <div class="timer-container">
            <input type="text" id="timer-display" value="01:00">
            <br>
            <button class="timer-btn" style="background:#1e8e3e; color:white" onclick="startTimer()">ጀምር</button>
            <button class="timer-btn" style="background:#d93025; color:white" onclick="stopTimer()">ቁም</button>
        </div>

        <table id="resultsTable">
            <thead>
                <tr>
                    <th rowspan="2">ቁጥር</th>
                    <th rowspan="2" style="width:150px">የተወዳዳሪዎች ስም</th>
                    <th colspan="3">አማርኛ</th>
                    <th colspan="3">እንግሊዝኛ</th>
                    <th colspan="3">ሒሳብ</th>
                    <th colspan="3">አ/ሳይንስ</th>
                    <th colspan="3">ግብረገብ</th>
                    <th rowspan="2">ድምር</th>
                    <th rowspan="2">ደረጃ</th>
                </tr>
                <tr style="background:#f8f9fa; font-size:11px">
                    <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
                    <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
                    <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
                    <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
                    <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <br>
        <button class="action-btn" style="background:#1a73e8;" onclick="addRow()">+ ተማሪ ጨምር</button>

        <div class="final-actions" style="text-align:center; margin-top:20px;">
            <button class="action-btn" style="background:#d93025;" onclick="clearAllData()">🗑️ Reset</button>
            <button class="action-btn" style="background:#1e8e3e;" onclick="autoSaveData(); alert('ተቀምጧል!')">💾 Save</button>
            <button class="action-btn" style="background:#1a73e8;" onclick="window.print()">🖨️ Print</button>
        </div>
    </div>
</div>

<script>
    const MY_PASS = "Eshet21d";

    function checkPass() {
        const input = document.getElementById('pass-input').value;
        if (input === MY_PASS) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadSavedData();
        } else {
            alert("የተሳሳተ የይለፍ ቃል!");
        }
    }

    // Enter ሲጫኑ እንዲከፍት
    document.getElementById("pass-input").addEventListener("keyup", function(event) {
        if (event.key === "Enter") { checkPass(); }
    });

    let timerInterval;
    function startTimer() {
        stopTimer();
        let timeParts = document.getElementById('timer-display').value.split(':');
        let totalSeconds = (parseInt(timeParts[0]) * 60) + (parseInt(timeParts[1]) || 0);
        timerInterval = setInterval(() => {
            if (totalSeconds <= 0) { clearInterval(timerInterval); alert("ጊዜው አልቋል!"); return; }
            totalSeconds--;
            let m = Math.floor(totalSeconds / 60);
            let s = totalSeconds % 60;
            document.getElementById('timer-display').value = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }, 1000);
    }
    function stopTimer() { clearInterval(timerInterval); }

    function toggleTouch(cell) {
        if (cell.innerHTML === "") { cell.innerHTML = "✓"; cell.className = "touch-cell status-right"; }
        else if (cell.innerHTML === "✓") { cell.innerHTML = "X"; cell.className = "touch-cell status-wrong"; }
        else { cell.innerHTML = ""; cell.className = "touch-cell status-none"; }
        calculateResults();
        autoSaveData();
    }

    function addRow() {
        const tableBody = document.querySelector("#resultsTable tbody");
        const row = tableBody.insertRow();
        let cellsHTML = `<td>${tableBody.rows.length}</td>
                         <td><input type="text" oninput="autoSaveData()" style="width:95%; border:none; outline:none;"></td>`;
        for(let i=0; i<5; i++) {
            cellsHTML += `<td><input type="text" oninput="autoSaveData()" style="width:30px; border:none; text-align:center;"></td>
                          <td class="touch-cell status-none" onclick="toggleTouch(this)"></td>
                          <td class="touch-cell status-none" onclick="toggleTouch(this)"></td>`;
        }
        cellsHTML += `<td class="grand-total" style="font-weight:bold">0</td><td class="rank">-</td>`;
        row.innerHTML = cellsHTML;
        autoSaveData();
    }

    function calculateResults() {
        const allRows = Array.from(document.querySelector("#resultsTable tbody").rows);
        let scores = allRows.map((row, index) => {
            const total = Array.from(row.getElementsByClassName('touch-cell')).reduce((sum, cell) => sum + (cell.innerHTML === "✓" ? 1 : 0), 0);
            row.querySelector('.grand-total').innerText = total;
            return { index, total };
        });
        let sorted = [...scores].sort((a, b) => b.total - a.total);
        scores.forEach(item => {
            allRows[item.index].querySelector('.rank').innerText = sorted.findIndex(s => s.total === item.total) + 1;
        });
    }

    function autoSaveData() {
        const rows = Array.from(document.querySelector("#resultsTable tbody").rows);
        const data = rows.map(row => ({
            name: row.querySelectorAll('input')[0].value,
            inputs: Array.from(row.querySelectorAll('input')).slice(1).map(i => i.value),
            marks: Array.from(row.querySelectorAll('.touch-cell')).map(c => c.innerHTML)
        }));
        localStorage.setItem('quiz_final_save', JSON.stringify(data));
    }

    function loadSavedData() {
        const saved = localStorage.getItem('quiz_final_save');
        const tableBody = document.querySelector("#resultsTable tbody");
        tableBody.innerHTML = "";
        if (!saved) { addRow(); return; }
        JSON.parse(saved).forEach((st, idx) => {
            const row = tableBody.insertRow();
            let mIdx = 0, iIdx = 0;
            let html = `<td>${idx+1}</td><td><input type="text" value="${st.name}" oninput="autoSaveData()" style="width:95%; border:none;"></td>`;
            for(let i=0; i<5; i++) {
                html += `<td><input type="text" value="${st.inputs[iIdx++] || ''}" oninput="autoSaveData()" style="width:30px; border:none; text-align:center;"></td>
                         <td class="touch-cell ${getCls(st.marks[mIdx])}" onclick="toggleTouch(this)">${st.marks[mIdx++] || ''}</td>
                         <td class="touch-cell ${getCls(st.marks[mIdx])}" onclick="toggleTouch(this)">${st.marks[mIdx++] || ''}</td>`;
            }
            html += `<td class="grand-total" style="font-weight:bold">0</td><td class="rank">-</td>`;
            row.innerHTML = html;
        });
        calculateResults();
    }

    function getCls(v) { return v === "✓" ? "status-right" : v === "X" ? "status-wrong" : "status-none"; }
    
    function clearAllData() {
        if (confirm("ሁሉንም ዳታ አጥፍቶ አዲስ ለመጀመር እርግጠኛ ነዎት?")) {
            localStorage.removeItem('quiz_final_save');
            window.location.reload();
        }
    }
</script>

</body>
</html>
