<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የውጤት መቆጣጠሪያ - መ/ር ደለለኝ አጥላው</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #1e3a8a;
            --accent-gold: #d4af37;
            --soft-bg: #f8fafc;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border-top: 15px solid var(--main-blue);
            text-align: center;
        }

        .teacher-badge {
            background: var(--main-blue);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .teacher-badge h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
        }

        .school-tag {
            color: var(--accent-gold);
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        /* ፋይል መጫኛ ለባለቤቱ ብቻ */
        .admin-upload {
            background: #fff8e1;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed var(--accent-gold);
            margin-bottom: 25px;
            font-size: 13px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--main-blue);
        }

        input[type="text"], select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fdfdfd;
        }

        .btn-search {
            background: var(--main-blue);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-search:hover { background: #152a61; }

        /* የውጤት ካርድ (መጀመሪያ የተደበቀ) */
        #result-card {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: #f1f5f9;
            border-radius: 20px;
            text-align: left;
            border-left: 8px solid #10b981;
        }

        .res-data { display: block; font-size: 20px; color: var(--main-blue); font-weight: 700; margin-bottom: 10px; }
        .score-big { font-size: 35px; color: #10b981; }

        #errorBox { color: #ef4444; display: none; margin-top: 20px; font-weight: bold; }

        footer { margin-top: 40px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <div class="teacher-badge">
        <h1>መ/ር ደለለኝ አጥላው</h1>
        <span class="school-tag">ጣይቱ ብጡል አካዳሚ</span>
    </div>

    <!-- ይህ ክፍል መምህሩ ፋይሉን እንዲጭን ብቻ ነው -->
    <div class="admin-upload" id="adminPanel">
        <label>የተማሪዎች ዝርዝር (CSV) ይጫኑ</label>
        <input type="file" id="csvUpload" accept=".csv">
    </div>

    <div class="input-group">
        <label>የተማሪው ሙሉ ስም</label>
        <input type="text" id="nameInput" placeholder="ስም በትክክል ያስገቡ">
    </div>

    <div class="input-group">
        <label>የክፍል ደረጃ</label>
        <select id="gradeInput">
            <option value="">-- ክፍል ይምረጡ --</option>
            <option value="1A">1A</option> <option value="1B">1B</option>
            <option value="2A">2A</option> <option value="2B">2B</option>
            <option value="3A">3A</option> <option value="4A">4A</option>
            <option value="5A">5A</option> <option value="6A">6A</option>
        </select>
    </div>

    <button class="btn-search" onclick="searchResult()">ውጤት አሳይ</button>

    <!-- ውጤት ማሳያ -->
    <div id="result-card">
        <span style="font-size: 12px; color: #64748b;">የተማሪ ስም፦</span>
        <span class="res-data" id="outName"></span>
        
        <span style="font-size: 12px; color: #64748b;">ውጤት፦</span>
        <span class="res-data score-big" id="outScore"></span>
        
        <span style="font-size: 12px; color: #64748b;">አስተያየት፦</span>
        <span class="res-data" id="outComment" style="font-weight: 400; font-size: 16px; font-style: italic;"></span>
    </div>

    <p id="errorBox">⚠️ መረጃው አልተገኘም። እባክዎን ስም እና ክፍል በትክክል መሆኑን ያረጋግጡ።</p>

    <footer>እንግሊዝኛ (English) | 2018 ዓ.ም</footer>
</div>

<script>
    let studentDatabase = [];

    // ፋይሉን መጫን
    document.getElementById('csvUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const rows = event.target.result.split('\n');
            studentDatabase = rows.slice(1).map(row => {
                const cols = row.split(',');
                if(cols.length >= 4) {
                    return {
                        name: cols[0].trim(),
                        grade: cols[1].trim(),
                        score: cols[2].trim(),
                        comment: cols[3].trim()
                    };
                }
            }).filter(item => item !== undefined);
            alert("ዳታቤዙ ተዘጋጅቷል። አሁን ተማሪዎች መፈለግ ይችላሉ።");
            // ፋይል መጫኛውን መደበቅ ከፈለክ (አማራጭ)
            // document.getElementById('adminPanel').style.display = 'none';
        };
        reader.readAsText(file);
    });

    function searchResult() {
        const nameQuery = document.getElementById('nameInput').value.trim();
        const gradeQuery = document.getElementById('gradeInput').value;
        const card = document.getElementById('result-card');
        const err = document.getElementById('errorBox');

        // መፈለግ (በስም እና በክፍል)
        const student = studentDatabase.find(s => 
            s.name.toLowerCase() === nameQuery.toLowerCase() && 
            s.grade === gradeQuery
        );

        if(student) {
            document.getElementById('outName').innerText = student.name;
            document.getElementById('outScore').innerText = student.score;
            document.getElementById('outComment').innerText = student.comment;
            card.style.display = 'block';
            err.style.display = 'none';
        } else {
            card.style.display = 'none';
            err.style.display = 'block';
        }
    }
</script>

</body>
</html>
