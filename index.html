<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የውጤት መጠየቂያ - ጣይቱ ብጡል አካዳሚ</title>
    <style>
        :root {
            --aqua: #00FFFF;       /* ውኃ ሰማያዊ - ከሳጥን ውጭ */
            --seafoam: #7FFFD4;    /* ውኃ አረንጓዴ - በሳጥን ውስጥ */
            --gold: #FFD700;       /* ወርቃማ - ለመምህሩ ስም */
            --bg-dark: #060c1a;    /* ጥቁር ዳራ */
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--aqua);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ርዕስ (Header) */
        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 2px solid var(--gold);
        }

        .school-name { 
            font-size: 3.5rem; 
            color: #00BFFF; 
            margin: 0; 
            font-weight: 900;
        }

        .teacher-name { 
            color: var(--gold); 
            font-size: 1.4rem; 
            margin-top: 10px; 
            font-weight: bold; 
        }

        /* ዋናው መጠየቂያ ሳጥን */
        .query-box {
            max-width: 600px;
            width: 90%;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: var(--aqua);
            font-size: 1.8rem;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--aqua); /* ውኃ ሰማያዊ */
        }

        /* የመፃፊያ ሳጥኖች */
        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid var(--aqua);
            border-radius: 12px;
            color: var(--seafoam); /* ውኃ አረንጓዴ */
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }

        input::placeholder {
            color: rgba(127, 255, 212, 0.3);
        }

        /* የውጤት ማሳያ */
        .result-panel {
            background: rgba(127, 255, 212, 0.05);
            border: 2px dashed var(--seafoam);
            height: 80px;
            margin-top: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--seafoam); /* ውኃ አረንጓዴ */
        }

        /* ቁልፎች */
        .btn {
            width: 100%;
            padding: 18px;
            margin-top: 25px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-search {
            background: #00BFFF;
            color: white;
        }

        .btn-search:hover {
            background: var(--aqua);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .btn-feedback {
            background: #20B2AA;
            color: white;
            margin-top: 15px;
        }

        footer {
            padding: 40px;
            text-align: center;
            opacity: 0.6;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="school-name">ጣይቱ ብጡል አካዳሚ</h1>
        <div class="teacher-name">መ/ር ደለለኝ አጥላው</div>
    </header>

    <div class="query-box">
        <h2>ተማሪዎች ውጤት መጠየቂያ</h2>

        <form>
            <label>የተማሪው ሙሉ ስም፡</label>
            <input type="text" placeholder="ሙሉ ስምዎን እዚህ ያስገቡ...">

            <label>የክፍል ደረጃ፡</label>
            <select>
                <option value="">-- ክፍል ይምረጡ --</option>
                <option>1A</option><option>1B</option>
                <option>2A</option><option>2B</option>
                <option>3A</option><option>4A</option>
                <option>5A</option><option>6A</option>
            </select>

            <label>የፈተና ዓይነት፡</label>
            <select>
                <option>ከ 10%</option>
                <option>ከ 20%</option>
                <option>ከ 40%</option>
                <option>ከ 100% (ጠቅላላ)</option>
            </select>

            <button type="button" class="btn btn-search">ውጤቴን አሳይ</button>

            <label>የተገኘ ውጤት፦</label>
            <div class="result-panel">-- / --</div>

            <label>የመምህሩ አስተያየት (Teacher's Comment):</label>
            <textarea rows="2" readonly placeholder="የመምህሩ አስተያየት እዚህ ይጫናል..."></textarea>

            <label>የወላጅ አስተያየት (ካለዎት):</label>
            <textarea rows="2" placeholder="አስተያየትዎን እዚህ ይፃፉ..."></textarea>
            
            <button type="submit" class="btn btn-feedback">አስተያየት ላክ</button>
        </form>
    </div>

    <footer>
        &copy; 2026 ጣይቱ ብጡል አካዳሚ | መ/ር ደለለኝ አጥላው
    </footer>

</body>
</html>
