<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - English Result</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #00BFFF; --gold: #FFD700; --dark: #003366;
            --glass: rgba(255, 255, 255, 0.92);
        }

        body {
            font-family: 'Segoe UI', sans-serif; margin: 0;
            background-color: #f0f0f0; background-size: cover;
            background-attachment: fixed; background-position: center;
        }

        /* 3D Header */
        .main-header {
            text-align: center; padding: 25px; background: rgba(0, 51, 102, 0.85);
            color: white; border-bottom: 5px solid var(--gold);
            text-shadow: 2px 2px 4px #000;
        }
        .school-title { font-size: 2.5rem; color: var(--primary); margin: 0; }

        .nav-header { position: fixed; top: 10px; right: 10px; z-index: 1000; }
        .nav-btn {
            background: var(--gold); color: var(--dark); border: 2px solid var(--dark);
            padding: 6px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }

        .container { max-width: 1150px; margin: 20px auto; padding: 10px; }

        /* Mirror Card Effect */
        .card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 3px solid var(--dark); border-radius: 35px;
            padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Horizontal 4-Maezen Inputs */
        .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .flex-row > div, .flex-row input, .flex-row select { flex: 1; min-width: 150px; height: 40px; border-radius: 12px; border: 2px solid var(--primary); padding: 0 10px; box-sizing: border-box; }
        .btn-sm { height: 40px; padding: 0 20px; border-radius: 12px; background: var(--dark); color: white; border: none; cursor: pointer; font-weight: bold; }

        /* Analysis Table - Exactly like your Image */
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; border: 2px solid black; }
        th, td { border: 1px solid black; padding: 5px; text-align: center; font-size: 11px; }
        th { background: #eee; font-weight: bold; }
        .res-box { background: #fffde7; border: 2px dashed var(--gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; height: 40px; min-width: 120px; }

        .hidden { display: none; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

    <div class="nav-header">
        <button class="nav-btn" onclick="showPage('userPage')">ተማሪ</button>
        <button class="nav-btn" onclick="showPage('adminPage')">አድሚን</button>
    </div>

    <div class="main-header">
        <h1 class="school-title">ጣይቱ ብጡል አካዳሚ</h1>
        <p>ኢንግሊዝኛ - መ/ር ደለለኝ አጥላው</p>
    </div>

    <div class="container">
        <div id="userPage">
            <div class="card">
                <h4>ውጤት መፈለጊያ</h4>
                <div class="flex-row">
                    <input type="text" id="uName" placeholder="ሙሉ ስም...">
                    <select id="uGrade">
                        <option value="">ክፍል...</option>
                        <option>1A</option><option>1B</option><option>2A</option><option>2B</option><option>3A</option><option>4A</option><option>5A</option><option>6A</option>
                    </select>
                    <button class="btn-sm" onclick="search()">አሳይ</button>
                    <div id="resBox" class="res-box" style="visibility: hidden;">--</div>
                </div>
            </div>
            <div class="card">
                <h4>ጋለሪ</h4>
                <div id="userGal" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px;"></div>
            </div>
        </div>

        <div id="adminPage" class="hidden">
            <div id="loginBox" class="card" style="text-align: center;">
                <input type="password" id="pass" placeholder="Password" style="width: 200px;">
                <button class="btn-sm" onclick="login()">ግባ</button>
            </div>

            <div id="adminDash" class="hidden">
                <div class="card no-print">
                    <h4>መረጃ መጫኛ (4-Maezen)</h4>
                    <div class="flex-row">
                        <div><small>ጀርባ:</small><input type="file" onchange="setBg(event)"></div>
                        <div><small>Excel:</small><input type="file" id="xlIn"></div>
                        <div><small>ጋለሪ:</small><input type="file" multiple onchange="upGal(event)"></div>
                        <button class="btn-sm" style="background: #007bff;" onclick="window.print()">Print Report</button>
                    </div>
                </div>

                <div class="card">
                    <h3 style="text-align: center;">የውጤት ትንተና</h3>
                    <div class="table-wrapper">
                        <table id="statTable">
                            <thead>
                                <tr>
                                    <th rowspan="2">ክፍል</th>
                                    <th colspan="3">ጠቅላላ ተማሪ</th>
                                    <th colspan="3">ከ50% በታች</th>
                                    <th colspan="3">አፈፃፀም %</th>
                                    <th colspan="3">50%-74%</th>
                                    <th colspan="3">አፈፃፀም %</th>
                                    <th colspan="3">75%-84%</th>
                                    <th colspan="3">አፈፃፀም %</th>
                                    <th colspan="3">85%-100%</th>
                                    <th colspan="3">አፈፃፀም %</th>
                                </tr>
                                <tr>
                                    <th>ወ</th><th>ሴ</th><th>ድ</th>
                                    <th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th>
                                    <th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th>
                                    <th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th>
                                    <th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th>
                                </tr>
                            </thead>
                            <tbody id="stBody"></tbody>
                        </table>
                    </div>
                    <div style="margin-top: 15px;">
                        <p><b>መ/ር ደለለኝ አጥላው</b><br>ፊርማ፡ ________________<br>ቀን፡ ________________</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sts = JSON.parse(localStorage.getItem('db_s')) || [];
        let gals = JSON.parse(localStorage.getItem('db_g')) || [];
        if(localStorage.getItem('db_b')) document.body.style.backgroundImage = `url(${localStorage.getItem('db_b')})`;

        function showPage(p) {
            document.getElementById('userPage').classList.toggle('hidden', p!=='userPage');
            document.getElementById('adminPage').classList.toggle('hidden', p!=='adminPage');
        }

        function login() {
            if(document.getElementById('pass').value === "Eshet21d") {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminDash').classList.remove('hidden');
                runAnalysis();
            }
        }

        document.getElementById('xlIn').addEventListener('change', function(e) {
            let r = new FileReader();
            r.onload = (ex) => {
                let d = new Uint8Array(ex.target.result);
                let wb = XLSX.read(d, {type:'array'});
                let rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                sts = rows.map(i => ({
                    n: i.Name || i.ስም, s: String(i.Sex || i.ጾታ || "").toUpperCase(), g: String(i.Grade || i.ክፍል),
                    t: (Number(i.Notebook||0)+Number(i.Quiz1||0)+Number(i.Quiz2||0)+Number(i.Mid||0)+Number(i.Final||0)),
                    nt: i.Note || ""
                }));
                localStorage.setItem('db_s', JSON.stringify(sts));
                alert("ተሳክቷል!"); runAnalysis();
            };
            r.readAsArrayBuffer(e.target.files[0]);
        });

        function runAnalysis() {
            const gs = ["1A", "1B", "2A", "2B", "3A", "4A", "5A", "6A"];
            const rs = [{n:0,x:49.9}, {n:50,x:74.9}, {n:75,x:84.9}, {n:85,x:100}];
            let h = "";
            gs.forEach(g => {
                let d = sts.filter(s => s.g.includes(g));
                let mW = d.filter(s => s.s.startsWith('M')||s.s.startsWith('ወ')).length;
                let mS = d.filter(s => s.s.startsWith('F')||s.s.startsWith('ሴ')).length;
                let mD = mW + mS;
                h += `<tr><td><b>${g}</b></td><td>${mW}</td><td>${mS}</td><td>${mD}</td>`;
                rs.forEach(r => {
                    let w = d.filter(s => (s.s.startsWith('M')||s.s.startsWith('ወ')) && s.t>=r.n && s.t<=r.x).length;
                    let s = d.filter(s => (s.s.startsWith('F')||s.s.startsWith('ሴ')) && s.t>=r.n && s.t<=r.x).length;
                    let t = w+s;
                    h += `<td>${w}</td><td>${s}</td><td>${t}</td>`;
                    h += `<td>${mW?((w/mW)*100).toFixed(0):0}%</td><td>${mS?((s/mS)*100).toFixed(0):0}%</td><td>${mD?((t/mD)*100).toFixed(0):0}%</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('stBody').innerHTML = h;
        }

        function search() {
            let n = document.getElementById('uName').value.trim().toLowerCase();
            let g = document.getElementById('uGrade').value;
            let f = sts.find(s => s.n.toLowerCase() === n && s.g.includes(g));
            let b = document.getElementById('resBox');
            if(f) { b.style.visibility = "visible"; b.innerText = f.t + "% - " + f.nt; }
            else { alert("አልተገኘም!"); }
        }

        function setBg(e) {
            let r = new FileReader();
            r.onload = (ev) => { localStorage.setItem('db_b', ev.target.result); document.body.style.backgroundImage = `url(${ev.target.result})`; };
            r.readAsDataURL(e.target.files[0]);
        }

        function upGal(e) {
            for(let f of e.target.files) {
                let r = new FileReader();
                r.onload = (ev) => { gals.push(ev.target.result); localStorage.setItem('db_g', JSON.stringify(gals)); renderGal(); };
                r.readAsDataURL(f);
            }
        }

        function renderGal() { document.getElementById('userGal').innerHTML = gals.map(s => `<img src="${s}" style="width:100%; border-radius:15px; border:2px solid var(--gold);">`).join(''); }
        renderGal();
    </script>
</body>
</html>
