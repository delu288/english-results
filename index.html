<div class="timer-container" style="text-align: center; background: #f9f9f9; border: 2px solid #333; padding: 10px; border-radius: 8px; width: 220px; margin: 10px auto; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);">
    <h3 style="margin: 0; font-size: 1rem; color: #555;">የጥያቄ ሰዓት</h3>
    <div id="display" style="font-size: 2.2rem; font-weight: bold; color: #d9534f; margin: 5px 0; font-family: 'Courier New', Courier, monospace;">01:00</div>
    
    <div style="margin-bottom: 8px;">
        <button onclick="setTimer(60)" style="font-size: 0.8rem; padding: 3px 8px; cursor: pointer;">1 ደቂቃ</button>
        <button onclick="setTimer(120)" style="font-size: 0.8rem; padding: 3px 8px; cursor: pointer;">2 ደቂቃ</button>
    </div>

    <div class="timer-controls">
        <button onclick="startTimer()" style="background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">ጀምር</button>
        <button onclick="stopTimer()" style="background: #ffc107; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">ቁም</button>
        <button onclick="resetTimer()" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">ቀይር</button>
    </div>
</div>

<script>
    let timerInterval;
    let timeRemaining = 60; // Default 1 min
    let running = false;

    function updateDisplay() {
        const minutes = Math.floor(timeRemaining / 60);
        const seconds = timeRemaining % 60;
        document.getElementById('display').textContent = 
            `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function setTimer(secs) {
        stopTimer();
        timeRemaining = secs;
        updateDisplay();
    }

    function startTimer() {
        if (running) return;
        running = true;
        timerInterval = setInterval(() => {
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                running = false;
                alert("ጊዜው አብቅቷል!");
            } else {
                timeRemaining--;
                updateDisplay();
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        running = false;
    }

    function resetTimer() {
        stopTimer();
        timeRemaining = 60; // Reset to default
        updateDisplay();
    }
</script>
