<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - English Result</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-blue: #00BFFF;
            --gold: #FFD700;
            --dark-blue: #003366;
            --border-width: 4px;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
            min-height: 100vh;
        }

        /* Top Corner Navigation */
        .top-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .nav-btn {
            background: var(--dark-blue);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .nav-btn:hover { background: var(--primary-blue); transform: scale(1.05); }

        /* Headers */
        .header-section { text-align: center; padding-top: 60px; }

        .school-name {
            color: var(--primary-blue);
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 3px 3px 0px #fff, 6px 6px 0px rgba(0,0,0,0.1);
            margin: 0;
        }

        .subject-tag {
            color: #ff4500;
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        .teacher-name {
            color: var(--gold);
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px #000;
            margin-top: 5px;
        }

        /* Main Container with thick borders */
        .main-card {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border: var(--border-width) solid var(--dark-blue);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Box styling */
        .content-box {
            border: 3px solid var(--primary-blue);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            background: #fff;
        }

        input, select, textarea {
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin: 10px 0;
            font-size: 1rem;
        }

        .action-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        /* Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .gallery-item {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border: 3px solid var(--gold);
            border-radius: 10px;
        }

        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 2px solid var(--dark-blue); padding: 10px; text-align: center; }
        th { background: var(--primary-blue); color: white; }

    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="showPage('userPage')">የተማሪዎች ገፅ</button>
        <button class="nav-btn" onclick="showPage('adminPage')">የአድሚን ገፅ</button>
    </div>

    <div class="header-section">
        <h1 class="school-name">ጣይቱ ብጡል አካዳሚ</h1>
        <span class="subject-tag">English</span>
        <h2 class="teacher-name">መ/ር ደለለኝ አጥላው</h2>
    </div>

    <div class="main-card">
        
        <div id="userPage">
            <div class="content-box">
                <h3 style="color: var(--dark-blue);">የውጤት መጠየቂያ</h3>
                <input type="text" id="searchName" placeholder="ሙሉ ስምዎን ያስገቡ...">
                <select id="userGrade">
                    <option>1ኛ ሀ</option><option>1ኛ ለ</option><option>2ኛ ሀ</option>
                    <option>2ኛ ለ</option><option>3ኛ</option><option>4ኛ</option>
                    <option>5ኛ</option><option>6ኛ</option>
                </select>
                <button class="action-btn" onclick="searchResult()">ውጤት መጠየቂያ</button>
            </div>

            <div id="resultDisplay" class="hidden content-box">
                <div id="resultContent"></div>
                <hr>
                <h4>ለወላጅ አስተያየት መላኪያ</h4>
                <textarea id="parentComment" placeholder="አስተያየትዎን እዚህ ይጻፉ..."></textarea>
                <button class="action-btn" style="background:#007bff;" onclick="sendComment()">አስተያየት ላክ</button>
            </div>
        </div>

        <div id="adminPage" class="hidden">
            <div id="adminLogin" class="content-box">
                <h3>አድሚን መግቢያ</h3>
                <input type="password" id="adminPass" placeholder="የይለፍ ቃል ያስገቡ">
                <button class="action-btn" onclick="checkAdmin()">ግባ</button>
            </div>

            <div id="adminContent" class="hidden">
                <div class="content-box">
                    <h4>መረጃ በፋይል መጫኛ (Excel/Document)</h4>
                    <input type="file" id="fileUpload" accept=".xlsx, .xls">
                    <p style="font-size: 0.8rem; color: #666;">* ስም፣ ጾታ፣ እና ውጤቶችን የያዘ ፋይል ይጫኑ</p>
                </div>

                <div class="content-box">
                    <h4>ፎቶ ጋለሪ ማስተዳደሪያ</h4>
                    <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotos(event)">
                    <div id="galleryContainer" class="gallery-grid"></div>
                </div>

                <div class="content-box">
                    <h4>የውጤት ትንተና</h4>
                    <table id="analysisTable">
                        <thead>
                            <tr><th>ደረጃ</th><th>ወንድ</th><th>ሴት</th><th>ድምር</th></tr>
                        </thead>
                        <tbody id="analysisBody"></tbody>
                    </table>
                    <br>
                    <button class="action-btn" style="background: #1d6f42;" onclick="exportToExcel()">ትንተናውን ወደ Excel አውርድ (XLSX)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('students')) || [];
        let photos = JSON.parse(localStorage.getItem('gallery')) || [];

        function showPage(pageId) {
            document.getElementById('userPage').classList.add('hidden');
            document.getElementById('adminPage').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

        function checkAdmin() {
            if(document.getElementById('adminPass').value === "1234") {
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                updateAnalysis();
                loadGallery();
            } else { alert("የተሳሳተ ኮድ!"); }
        }

        // Excel Export Function
        function exportToExcel() {
            let table = document.getElementById("analysisTable");
            let wb = XLSX.utils.table_to_book(table, {sheet: "የውጤት ትንተና"});
            XLSX.writeFile(wb, "Taitu_Academy_Analysis.xlsx");
        }

        // Photo Gallery Logic
        function handlePhotos(event) {
            const files = event.target.files;
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    photos.push(e.target.result);
                    localStorage.setItem('gallery', JSON.stringify(photos));
                    loadGallery();
                };
                reader.readAsDataURL(file);
            }
        }

        function loadGallery() {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = photos.map(src => `<img src="${src}" class="gallery-item">`).join('');
        }

        function searchResult() {
            let name = document.getElementById('searchName').value;
            let found = students.find(x => x.name.toLowerCase() === name.toLowerCase());
            let display = document.getElementById('resultDisplay');
            if(found) {
                display.classList.remove('hidden');
                document.getElementById('resultContent').innerHTML = `
                    <p><b>ተማሪ፡</b> ${found.name}</p>
                    <p><b>ጠቅላላ ውጤት፡</b> ${found.total}%</p>
                    <p><b>አስተያየት፡</b> ${found.note || 'የለም'}</p>
                `;
            } else { alert("ይህ ስም አልተመዘገበም!"); }
        }

        function updateAnalysis() {
            let ranges = [
                {label: "ከ 50% በታች", min: 0, max: 49},
                {label: "50% - 74%", min: 50, max: 74},
                {label: "75% - 84%", min: 75, max: 84},
                {label: "85% - 100%", min: 85, max: 100}
            ];
            let html = "";
            ranges.forEach(r => {
                let m = students.filter(s => s.sex==='M' && s.total >= r.min && s.total <= r.max).length;
                let f = students.filter(s => s.sex==='F' && s.total >= r.min && s.total <= r.max).length;
                html += `<tr><td>${r.label}</td><td>${m}</td><td>${f}</td><td>${m+f}</td></tr>`;
            });
            document.getElementById('analysisBody').innerHTML = html;
        }

        // Initialize
        loadGallery();
    </script>
</body>
</html>
