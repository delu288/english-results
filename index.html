<!-- የሰዓት ቆጣሪ ክፍል (Timer Section) -->
<div id="custom-timer-container" style="
    text-align: center; 
    border: 2px solid #2c3e50; 
    padding: 15px; 
    border-radius: 12px; 
    width: fit-content; 
    margin: 20px auto; 
    background-color: #f8f9fa; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transform: scale(0.85); /* መጠኑን ትንሽ ለማድረግ */
">
    <!-- ሰዓቱ የሚታይበት -->
    <h2 id="timer-display" style="font-size: 3rem; margin: 0 0 10px 0; font-family: monospace; color: #d9534f;">01:00</h2>
    
    <!-- ደቂቃ መምረጫ -->
    <div style="margin-bottom: 15px;">
        <button onclick="setTimer(60)" style="background: #17a2b8; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px;">1 ደቂቃ</button>
        <button onclick="setTimer(120)" style="background: #17a2b8; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">2 ደቂቃ</button>
    </div>

    <!-- ኦፕሬሽን ቁልፎች -->
    <div>
        <button id="startBtn" onclick="startTimer()" style="background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-right: 5px;">ጀምር</button>
        <button onclick="stopTimer()" style="background: #ffc107; color: black; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-right: 5px;">ቁም</button>
        <button onclick="resetTimer()" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem;">ቀይር</button>
    </div>
</div>

<script>
    let timerInterval;
    let timeLeft = 60; // ነባሪው 1 ደቂቃ
    let isRunning = false;

    const display = document.getElementById('timer-display');

    // ሰዓቱን በስክሪን ላይ የሚያሳይ
    function updateDisplay() {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        display.innerText = 
            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
        // ሰዓቱ ዜሮ ሲቃረብ ቀለሙን መቀየር
        if (timeLeft <= 10) {
            display.style.color = "#ff0000";
        } else {
            display.style.color = "#d9534f";
        }
    }

    // የደቂቃ አማራጭን ለመምረጥ
    function setTimer(seconds) {
        stopTimer();
        timeLeft = seconds;
        updateDisplay();
    }

    // ቆጠራ ለመጀመር
    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                isRunning = false;
                alert("ጊዜው አልቋል!");
            } else {
                timeLeft--;
                updateDisplay();
            }
        }, 1000);
    }

    // ለማቆም
    function stopTimer() {
        clearInterval(timerInterval);
        isRunning = false;
    }

    // ወደ መጀመሪያው ለመመለስ
    function resetTimer() {
        stopTimer();
        timeLeft = 60; // ወደ 1 ደቂቃ ይመለሳል
        updateDisplay();
    }
</script>
