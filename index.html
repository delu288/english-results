<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - English Result</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #00BFFF; --gold: #FFD700; --dark: #003366;
            --glass: rgba(255, 255, 255, 0.15); 
            --border-thick: 4px solid #00BFFF;
        }

        body {
            font-family: 'Segoe UI', sans-serif; margin: 0;
            background-color: #222; background-size: cover;
            background-attachment: fixed; background-position: center;
            color: white;
        }

        .main-header {
            text-align: center; padding: 20px; 
            background: rgba(0, 51, 102, 0.6);
            border-bottom: var(--border-thick);
            backdrop-filter: blur(8px);
        }
        .school-title { font-size: 2.2rem; color: var(--primary); margin: 0; text-shadow: 2px 2px 5px #000; }

        .nav-header { position: fixed; top: 10px; right: 10px; z-index: 1000; }
        .nav-btn {
            background: var(--gold); color: var(--dark); border: none;
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }

        .container { max-width: 1350px; margin: 20px auto; padding: 10px; }

        .card {
            background: var(--glass); backdrop-filter: blur(12px);
            border: var(--border-thick); border-radius: 30px; 
            padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .admin-item { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); }

        .inbox-container { height: 180px; overflow-y: auto; font-size: 12px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 1px solid #444; text-align: left; }
        .msg-item { border-bottom: 1px solid #555; padding: 8px 0; color: white; }
        .msg-item b { color: var(--gold); }

        .btn-sm { height: 38px; padding: 0 20px; border-radius: 10px; background: var(--dark); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-print { background: #6c757d; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; background: rgba(0, 0, 0, 0.3); margin-top: 10px; }
        th, td { border: 1px solid rgba(255,255,255,0.3); padding: 4px; text-align: center; font-size: 11px; color: white; }
        th { background: rgba(0, 51, 102, 0.8); }

        .hidden { display: none; }

        /* PRINT SETTINGS */
        @media print {
            .no-print, .nav-header, .main-header, #loginBox, .admin-item:not(.printable-inbox), .admin-grid > div:not(.printable-inbox) { 
                display: none !important; 
            }
            body { background: white !important; color: black !important; }
            .container { max-width: 100% !important; width: 100%; margin: 0; padding: 0; }
            .card { border: none !important; background: white !important; color: black !important; box-shadow: none !important; }
            
            /* ሰንጠረዡን ብቻ ፕሪንት ለማድረግ */
            body.print-table #msgInbox, body.print-table .btn-print { display: none !important; }
            body.print-table table, body.print-table th, body.print-table td { border: 1px solid black !important; color: black !important; }
            
            /* ኢንቦክሱን ብቻ ፕሪንት ለማድረግ */
            body.print-inbox #statTable, body.print-inbox .table-title, body.print-inbox .admin-item:not(.printable-inbox) { display: none !important; }
            body.print-inbox #msgInbox { height: auto !important; overflow: visible !important; border: 1px solid black !important; padding: 10px; }
            body.print-inbox .msg-item { color: black !important; border-bottom: 1px solid black !important; }
        }
    </style>
</head>
<body>

    <div class="nav-header no-print">
        <button class="nav-btn" onclick="showPage('userPage')">ተማሪ</button>
        <button class="nav-btn" onclick="showPage('adminPage')">አድሚን</button>
    </div>

    <div class="main-header no-print">
        <h1 class="school-title">ጣይቱ ብጡል አካዳሚ</h1>
        <div style="color: var(--gold); font-weight: bold;">መ/ር ደለለኝ አጥላው // English</div>
    </div>

    <div class="container">
        <div id="userPage">
            <div class="card no-print">
                <h4>ውጤት መፈለጊያ</h4>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="uName" placeholder="የተማሪ ስም..." style="flex:2; height:38px; border-radius:10px; padding:0 10px; border:1px solid var(--primary); background:#000; color:#fff;">
                    <select id="uGrade" style="flex:1; border-radius:10px; background:#000; color:#fff;">
                        <option value="">ክፍል...</option>
                        <option>1A</option><option>1B</option><option>2A</option><option>2B</option><option>3A</option><option>4A</option><option>5A</option><option>6A</option>
                    </select>
                    <button class="btn-sm" onclick="search()">አሳይ</button>
                </div>
                <div style="display:flex; gap:15px; flex-wrap:wrap;">
                    <div style="flex:1; min-width:250px;">
                        <small>ለወላጅ አስተያየት (Inbox):</small>
                        <textarea id="pMsg" style="width:100%; height:80px; margin-top:5px; border-radius:10px; padding:10px; background:rgba(0,0,0,0.5); color:white; border:1px solid var(--primary);"></textarea>
                        <button class="btn-sm" style="width:100%; margin-top:10px; background:#28a745;" onclick="sendMsg()">አስተያየት ላክ</button>
                    </div>
                    <div style="flex:1; min-width:250px; border:1px dashed var(--gold); border-radius:15px; padding:10px; text-align:center; display:flex; align-items:center; justify-content:center;">
                        <div id="resBoxLarge" style="color:var(--gold); font-weight:bold;">መረጃ አልተፈለገም</div>
                    </div>
                </div>
            </div>
            <div class="card no-print">
                <h4>ፎቶ ጋለሪ</h4>
                <div id="userGal" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(130px,1fr)); gap:10px;"></div>
            </div>
        </div>

        <div id="adminPage" class="hidden">
            <div id="loginBox" class="card no-print" style="text-align:center;">
                <input type="password" id="pass" placeholder="Password" style="width:150px; height:35px; text-align:center;">
                <button class="btn-sm" onclick="login()">ግባ</button>
            </div>

            <div id="adminDash" class="hidden">
                <div class="card">
                    <div class="admin-grid no-print">
                        <div class="admin-item">
                            <label>ጀርባ ምስል</label><br>
                            <input type="file" onchange="setBg(event)">
                        </div>
                        <div class="admin-item">
                            <label>Excel የውጤት ፋይል</label><br>
                            <input type="file" id="xlIn" accept=".xlsx, .xls">
                        </div>
                        <div class="admin-item">
                            <label>ጋለሪ ፎቶ</label><br>
                            <input type="file" multiple onchange="upGal(event)">
                        </div>
                        <div class="admin-item printable-inbox">
                            <label>የወላጆች አስተያየት (Inbox)</label>
                            <div id="msgInbox" class="inbox-container">መልእክት የለም...</div>
                            <button class="btn-print no-print" onclick="printInbox()">Print Inbox Report</button>
                        </div>
                    </div>

                    <div style="overflow-x:auto; margin-top:20px;">
                        <h3 class="table-title" style="text-align:center; color:var(--gold);">ጣይቱ ብጡል አካዳሚ // English Result Analysis</h3>
                        <table id="statTable">
                            <thead>
                                <tr>
                                    <th rowspan="2">ክፍል</th><th colspan="3">ጠቅላላ ተማሪ</th><th colspan="3">ከ50% በታች</th><th colspan="3">አፈፃፀም %</th><th colspan="3">50%-74%</th><th colspan="3">አፈፃፀም %</th><th colspan="3">75%-84%</th><th colspan="3">አፈፃፀም %</th><th colspan="3">85%-100%</th><th colspan="3">አፈፃፀም %</th>
                                </tr>
                                <tr>
                                    <th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th><th>ወ</th><th>ሴ</th><th>ድ</th>
                                </tr>
                            </thead>
                            <tbody id="stBody"></tbody>
                        </table>
                    </div>
                    
                    <div class="no-print" style="margin-top:20px; display:flex; justify-content:space-between;">
                        <p><b>መ/ር ደለለኝ አጥላው</b><br>ፊርማ፡ ________________</p>
                        <div>
                            <button class="btn-sm" style="background:#28a745;" onclick="saveReport()">Save Excel</button>
                            <button class="btn-sm" style="background:#007bff;" onclick="printTable()">Print Analysis</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sts = JSON.parse(localStorage.getItem('db_s')) || [];
        let msgs = JSON.parse(localStorage.getItem('db_m')) || [];
        let gals = JSON.parse(localStorage.getItem('db_g')) || [];
        
        function updateUI() {
            let bg = localStorage.getItem('db_b');
            if(bg) document.body.style.backgroundImage = `url(${bg})`;
        }
        updateUI();

        function showPage(p) {
            document.getElementById('userPage').classList.toggle('hidden', p!=='userPage');
            document.getElementById('adminPage').classList.toggle('hidden', p!=='adminPage');
            if(p==='userPage') renderGal();
        }

        function login() {
            if(document.getElementById('pass').value === "Eshet21d") {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminDash').classList.remove('hidden');
                runAnalysis(); renderInbox();
            }
        }

        document.getElementById('xlIn').addEventListener('change', function(e) {
            let r = new FileReader();
            r.onload = (ex) => {
                let wb = XLSX.read(new Uint8Array(ex.target.result), {type:'array'});
                let rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                sts = rows.map(i => ({
                    n: i.Name || i.ስም, s: String(i.Sex||"").toUpperCase(), g: String(i.Grade||""),
                    t: (Number(i.Notebook||0)+Number(i.Quiz1||0)+Number(i.Quiz2||0)+Number(i.Mid||0)+Number(i.Final||0)),
                    nt: i.Note || ""
                }));
                localStorage.setItem('db_s', JSON.stringify(sts));
                runAnalysis(); alert("ዳታ ተጭኗል!");
            };
            r.readAsArrayBuffer(e.target.files[0]);
        });

        function runAnalysis() {
            const gs = ["1A", "1B", "2A", "2B", "3A", "4A", "5A", "6A"];
            const rs = [{n:0,x:49.9},{n:50,x:74.9},{n:75,x:84.9},{n:85,x:100}];
            let h = "";
            gs.forEach(g => {
                let d = sts.filter(s => s.g.toUpperCase().includes(g));
                let mW = d.filter(s => s.s.startsWith('M')||s.s.startsWith('ወ')).length;
                let mS = d.filter(s => s.s.startsWith('F')||s.s.startsWith('ሴ')).length;
                let mD = mW + mS;
                h += `<tr><td><b>${g}</b></td><td>${mW}</td><td>${mS}</td><td>${mD}</td>`;
                rs.forEach(r => {
                    let w = d.filter(s => (s.s.startsWith('M')||s.s.startsWith('ወ')) && s.t>=r.n && s.t<=r.x).length;
                    let s = d.filter(s => (s.s.startsWith('F')||s.s.startsWith('ሴ')) && s.t>=r.n && s.t<=r.x).length;
                    let t = w+s;
                    h += `<td>${w}</td><td>${s}</td><td>${t}</td><td>${mW?((w/mW)*100).toFixed(0):0}%</td><td>${mS?((s/mS)*100).toFixed(0):0}%</td><td>${mD?((t/mD)*100).toFixed(0):0}%</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('stBody').innerHTML = h;
        }

        function sendMsg() {
            let n = document.getElementById('uName').value.trim();
            let g = document.getElementById('uGrade').value;
            let m = document.getElementById('pMsg').value.trim();
            if(!n || !g || !m) { alert("እባክዎ መጀመሪያ ስምዎን፣ ክፍልዎን እና አስተያየትዎን ያስገቡ!"); return; }
            let dt = new Date().toLocaleString('am-ET');
            msgs.push({n, g, m, dt});
            localStorage.setItem('db_m', JSON.stringify(msgs));
            document.getElementById('pMsg').value = ""; alert("አስተያየትዎ ተልኳል!");
        }

        function renderInbox() {
            let h = "<h3 style='color:black; display:none;' class='show-on-print'>የወላጆች አስተያየት ሪፖርት</h3>";
            h += msgs.map(m => `
                <div class="msg-item">
                    <b>${m.n} (${m.g})</b> - <small>${m.dt}</small><br>
                    <span>${m.m}</span>
                </div>
            `).reverse().join('');
            document.getElementById('msgInbox').innerHTML = h;
        }

        function printInbox() {
            document.body.classList.add('print-inbox');
            window.print();
            document.body.classList.remove('print-inbox');
        }

        function printTable() {
            document.body.classList.add('print-table');
            window.print();
            document.body.classList.remove('print-table');
        }

        function search() {
            let n = document.getElementById('uName').value.trim().toLowerCase();
            let g = document.getElementById('uGrade').value;
            let f = sts.find(s => s.n.toLowerCase() === n && s.g.toUpperCase().includes(g));
            document.getElementById('resBoxLarge').innerHTML = f ? `ውጤት፡ ${f.t}% <br> መምህሩ፡ ${f.nt || "በርታ!"}` : "ተማሪው አልተገኘም!";
        }

        function setBg(e) {
            let r = new FileReader();
            r.onload = (ev) => { localStorage.setItem('db_b', ev.target.result); updateUI(); };
            r.readAsDataURL(e.target.files[0]);
        }

        function upGal(e) {
            for(let f of e.target.files) {
                let r = new FileReader();
                r.onload = (ev) => { gals.push(ev.target.result); localStorage.setItem('db_g', JSON.stringify(gals)); renderGal(); };
                r.readAsDataURL(f);
            }
        }

        function renderGal() { document.getElementById('userGal').innerHTML = gals.map(s => `<img src="${s}" style="width:100%; border-radius:10px; border:1px solid rgba(255,255,255,0.3);">`).join(''); }
        function saveReport() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("statTable")), "English_Analysis.xlsx"); }
    </script>
</body>
</html>
