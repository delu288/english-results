<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - የውጤት ሲስተም</title>
    <style>
        :root {
            --main-blue: #00BFFF; /* ውኃ ሰማያዊ */
            --bg-dark: #050a14;   /* ጥቁር ሰማያዊ */
            --gold: #FFD700;      /* ወርቃማ */
            --text-green: #7FFFD4; /* ውኃ አረንጓዴ */
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--main-blue);
        }

        /* ናቪጌሽን */
        nav {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--main-blue); }
        
        .nav-links a {
            color: var(--gold);
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* የፊት ገጽ (Home Section) */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(5, 10, 20, 0.8), rgba(5, 10, 20, 0.8)), 
                        url('https://via.placeholder.com/1920x1080/050a14/00BFFF?text=Taitu+Bitul+Academy');
            background-size: cover;
        }

        .school-name { font-size: 4.5rem; margin: 0; color: var(--main-blue); }
        .subtitle { font-size: 1.8rem; color: white; margin-bottom: 30px; }
        .teacher-name { color: var(--gold); font-size: 1.3rem; margin-top: 10px; }

        /* የአድሚን ገጽ (Admin Section) */
        .admin-section {
            display: none; /* መጀመሪያ ተደብቋል */
            max-width: 600px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--gold);
        }

        .upload-area {
            border: 2px dashed var(--gold);
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
            color: var(--gold);
        }

        .upload-area:hover { background: rgba(255, 215, 0, 0.1); }

        /* ፎርም ኤለመንቶች */
        label { display: block; margin-top: 20px; color: var(--main-blue); font-weight: bold; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid var(--main-blue);
            background: transparent;
            color: var(--text-green);
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn {
            background: var(--main-blue);
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        .btn-gold { background: var(--gold); }

        footer { text-align: center; padding: 40px; opacity: 0.6; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ጣይቱ ብጡል አካዳሚ</div>
        <div class="nav-links">
            <a onclick="showHome()">Home</a>
            <a onclick="showAdmin()">Admin Login</a>
        </div>
    </nav>

    <!-- የፊት ገጽ -->
    <div id="homePage" class="hero">
        <h1 class="school-name">ጣይቱ ብጡል አካዳሚ</h1>
        <div class="subtitle">የተማሪዎች ውጤት ማሳወቂያ ዌብሳይት</div>
        <div class="teacher-name">መ/ር ደለለኝ አጥላው</div>
        <button class="btn" style="width: auto; margin-top: 40px;" onclick="alert('ውጤት መፈለጊያ ገጽ በቅርቡ ይከፈታል!')">ውጤት ለመፈለግ እዚህ ይጫኑ</button>
    </div>

    <!-- የአድሚን ውጤት መጫኛ ገጽ -->
    <div id="adminPage" class="admin-section">
        <h2 style="color: var(--gold); text-align: center;">የውጤት መጫኛ (Admin)</h2>
        <p style="text-align: center;">ውድ መ/ር ደለለኝ፣ የተማሪዎችን ውጤት ፋይል እዚህ ይጫኑ።</p>
        
        <label>የውጤት ፋይል (Excel/CSV) መጫኛ፡</label>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <span id="fileText">ፋይሉን እዚህ ይጎትቱ ወይም ይጫኑ</span>
            <input type="file" id="fileInput" style="display: none;" onchange="updateFileName()">
        </div>

        <label>የትምህርት አይነት፡</label>
        <input type="text" value="ኢንግሊዝኛ (English)" readonly>

        <label>ክፍል፡</label>
        <select>
            <option>1A</option><option>1B</option><option>2A</option>
            <option>2B</option><option>3A</option><option>4A</option>
            <option>5A</option><option>6A</option>
        </select>

        <label>አጠቃላይ ማሳሰቢያ፡</label>
        <textarea rows="3" placeholder="ለመላው ክፍል የሚሆን አስተያየት..."></textarea>

        <button class="btn btn-gold">ውጤቱን መዝግብ</button>
    </div>

    <footer>
        &copy; 2026 ጣይቱ ብጡል አካዳሚ | All Rights Reserved
    </footer>

    <script>
        function showAdmin() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('adminPage').style.display = 'block';
        }

        function showHome() {
            document.getElementById('homePage').style.display = 'flex';
            document.getElementById('adminPage').style.display = 'none';
        }

        function updateFileName() {
            const input = document.getElementById('fileInput');
            const text = document.getElementById('fileText');
            if (input.files.length > 0) {
                text.innerText = "የተመረጠ ፋይል፡ " + input.files[0].name;
                text.style.color = "#7FFFD4";
            }
        }
    </script>

</body>
</html>
