<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - Admin Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #00BFFF; --gold: #FFD700; --dark: #003366; --glass: rgba(255, 255, 255, 0.15); --border-thick: 4px solid #00BFFF; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #222; color: white; }
        .nav-header { position: fixed; top: 10px; right: 10px; z-index: 1000; }
        .nav-btn { background: var(--gold); color: var(--dark); border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .container { max-width: 1300px; margin: 60px auto 20px; padding: 15px; }
        .card { background: var(--glass); backdrop-filter: blur(12px); border: var(--border-thick); border-radius: 30px; padding: 25px; margin-bottom: 25px; }
        
        /* Analysis Tables */
        .table-wrapper { overflow-x: auto; background: rgba(0,0,0,0.4); border-radius: 20px; padding: 15px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 12px; }
        th { background: var(--dark); color: var(--gold); }

        /* Scorer Grid */
        .scorer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 25px; }
        .scorer-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 15px; }
        .top-list { color: #00ff00; list-style: none; padding: 0; }
        .low-list { color: #ff4d4d; list-style: none; padding: 0; }
        .rank-label { font-weight: bold; color: var(--gold); margin-right: 5px; }

        .section-title { color: var(--gold); border-left: 5px solid var(--primary); padding-left: 10px; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <button class="nav-btn" onclick="location.reload()">ተማሪ ገጽ</button>
    </div>

    <div class="container">
        <div id="adminDash" class="card">
            <h2 style="text-align:center; color: var(--primary);">የእንግሊዝኛ ውጤት ትንተና ዳሽቦርድ</h2>
            
            <div style="text-align: center; margin-bottom: 30px; border: 2px dashed var(--primary); padding: 20px; border-radius: 20px;">
                <label>አዲስ የኤክሴል ፋይል ለመጫን፡</label><br><br>
                <input type="file" id="xlIn" accept=".xlsx, .xls">
            </div>

            <h3 class="section-title">1. አጠቃላይ የክፍል ሪፖርት</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th rowspan="2">ክፍል</th>
                            <th colspan="3">ጠቅላላ ተማሪ</th>
                            <th colspan="3">ያለፉ (>=50)</th>
                            <th colspan="3">የወደቁ (<50)</th>
                        </tr>
                        <tr>
                            <th>ወ</th><th>ሴ</th><th>ድምር</th>
                            <th>ወ</th><th>ሴ</th><th>ድምር</th>
                            <th>ወ</th><th>ሴ</th><th>ድምር</th>
                        </tr>
                    </thead>
                    <tbody id="analysisBody"></tbody>
                </table>
            </div>

            <h3 class="section-title">2. ከፍተኛ እና ዝቅተኛ ውጤቶች (በየክፍሉ)</h3>
            <div id="scorerContainer" class="scorer-grid">
                </div>
        </div>
    </div>

    <script>
        let sts = JSON.parse(localStorage.getItem('db_s')) || [];

        function init() {
            if(sts.length > 0) {
                renderAnalysis();
                renderScorers();
            }
        }
        init();

        document.getElementById('xlIn').addEventListener('change', function(e) {
            let reader = new FileReader();
            reader.onload = (event) => {
                let workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                let rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                sts = rows.map(r => ({
                    n: (r.Name || "").trim(),
                    s: (r.Sex || "M").trim().toUpperCase(),
                    g: (r.Grade || "").trim().toUpperCase(),
                    t: (Number(r.Notebook||0)+Number(r.Quiz1||0)+Number(r.Quiz2||0)+Number(r.Mid||0)+Number(r.Final||0))
                })).filter(s => s.n !== "");
                localStorage.setItem('db_s', JSON.stringify(sts));
                location.reload();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function renderAnalysis() {
            const grades = [...new Set(sts.map(s => s.g))].sort();
            let html = "";
            grades.forEach(g => {
                let d = sts.filter(s => s.g === g);
                let tM = d.filter(s => s.s==='M'||s.s==='ወ').length;
                let tF = d.filter(s => s.s==='F'||s.s==='ሴ').length;
                let pM = d.filter(s => (s.s==='M'||s.s==='ወ') && s.t>=50).length;
                let pF = d.filter(s => (s.s==='F'||s.s==='ሴ') && s.t>=50).length;
                html += `<tr><td><b>${g}</b></td><td>${tM}</td><td>${tF}</td><td>${tM+tF}</td><td style="color:#00ff00">${pM}</td><td style="color:#00ff00">${pF}</td><td style="color:#00ff00">${pM+pF}</td><td style="color:#ff4d4d">${tM-pM}</td><td style="color:#ff4d4d">${tF-pF}</td><td style="color:#ff4d4d">${(tM+tF)-(pM+pF)}</td></tr>`;
            });
            document.getElementById('analysisBody').innerHTML = html;
        }

        function renderScorers() {
            const grades = [...new Set(sts.map(s => s.g))].sort();
            let html = "";
            grades.forEach(g => {
                let d = sts.filter(s => s.g === g).sort((a,b) => b.t - a.t);
                let tops = d.slice(0, 3);
                let lows = d.slice(-3).reverse();

                html += `
                <div class="scorer-card">
                    <h4 style="color:var(--primary); border-bottom:1px solid #444; margin-bottom:10px;">ክፍል ${g}</h4>
                    
                    <div style="margin-bottom:15px;">
                        <small style="color:var(--gold)">🏆 ከፍተኛ ውጤት ያመጡ፡</small>
                        <ul class="top-list">
                            ${tops.map((s, i) => `<li><span class="rank-label">${i+1}ኛ.</span> ${s.n} (${s.t}%)</li>`).join('')}
                        </ul>
                    </div>

                    <div>
                        <small style="color:#ff4d4d">⚠️ ዝቅተኛ ውጤት ያመጡ፡</small>
                        <ul class="low-list">
                            ${lows.map((s, i) => `<li><span class="rank-label">${d.length - i}ኛ.</span> ${s.n} (${s.t}%)</li>`).join('')}
                        </ul>
                    </div>
                </div>`;
            });
            document.getElementById('scorerContainer').innerHTML = html;
        }
    </script>
</body>
</html>
