<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - የፊት ገጽ</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            background-color: #050a14;
        }

        /* ስላይድሾው መያዣ */
        .slideshow-container {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            filter: brightness(40%); /* ምስሉ ጽሑፉን እንዳይሸፍነው */
        }

        .slide.active {
            opacity: 1;
        }

        /* የይዘት መያዣ (Main Content) */
        .overlay {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 1;
            padding: 0 20px;
        }

        .admin-link {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #FFD700;
            text-decoration: none;
            border: 2px solid #FFD700;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .admin-link:hover {
            background: #FFD700;
            color: #000;
        }

        /* የትምህርት ቤቱ ስም አኒሜሽን */
        .school-name {
            font-size: 5.5rem;
            color: #00FFFF; /* ውኃ ሰማያዊ */
            font-weight: 900;
            margin: 0;
            text-shadow: 0 10px 30px rgba(0, 255, 255, 0.4);
            animation: fadeInDown 1.5s ease-out;
        }

        .motto {
            font-size: 1.8rem;
            color: #FFD700; /* ወርቃማ */
            margin-top: 10px;
            letter-spacing: 4px;
            font-weight: 300;
            animation: fadeInUp 2s ease-out;
        }

        .btn-box {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            animation: fadeIn 3s ease-in;
        }

        .action-btn {
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 15px;
            transition: 0.4s;
            cursor: pointer;
        }

        .btn-blue {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00FFFF;
            color: #00FFFF;
        }

        .btn-blue:hover {
            background: #00FFFF;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .btn-gold {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #FFD700;
            color: #FFD700;
        }

        .btn-gold:hover {
            background: #FFD700;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .teacher-footer {
            position: absolute;
            bottom: 30px;
            color: #FFD700;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="slideshow-container">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1470')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1541339907198-e08756ebafe3?q=80&w=1470')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=1504')"></div>
    </div>

    <div class="overlay">
        <a href="#" class="admin-link">Home / Admin Login</a>

        <h1 class="school-name">ጣይቱ ብጡል አካዳሚ</h1>
        <div class="motto">የጥበብና የልቀት ማዕከል</div>

        <div class="btn-box">
            <a href="#" class="action-btn btn-blue">ውጤት ለማየት</a>
            <a href="#" class="action-btn btn-gold">ጋለሪ ለመመልከት</a>
        </div>

        <div class="teacher-footer">
            መ/ር ደለለኝ አጥላው | 2018 ዓ.ም
        </div>
    </div>

    <script>
        // ስላይድሾው የሚቀያይር ኮድ
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // በየ 5 ሴኮንዱ ይቀይራል (5000ms)
        setInterval(nextSlide, 5000);
    </script>

</body>
</html>
