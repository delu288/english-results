<div class="card" style="overflow-x: auto;">
    <h4 style="text-align: center;">ጣይቱ ብጡል አካዳሚ - የውጤት ትንተና</h4>
    <table id="statTable" style="border: 2px solid black; width: 100%; border-collapse: collapse; font-size: 11px;">
        <thead>
            <tr style="background: #f2f2f2;">
                <th rowspan="2" style="border: 2px solid black; width: 50px;">ክፍል</th>
                <th colspan="3" style="border: 2px solid black;">ጠቅላላ የተማሪ ብዛት</th>
                <th colspan="3" style="border: 2px solid black;">ከ50% በታች</th>
                <th colspan="3" style="border: 2px solid black;">አፈፃፀም በ%</th>
                <th colspan="3" style="border: 2px solid black;">ከ50%-74%</th>
                <th colspan="3" style="border: 2px solid black;">አፈፃፀም በ%</th>
                <th colspan="3" style="border: 2px solid black;">75%-84%</th>
                <th colspan="3" style="border: 2px solid black;">አፈፃፀም በ%</th>
                <th colspan="3" style="border: 2px solid black;">85%-100%</th>
                <th colspan="3" style="border: 2px solid black;">አፈፃፀም በ%</th>
            </tr>
            <tr style="background: #f9f9f9;">
                <th style="border: 1px solid black;">ወ</th><th style="border: 1px solid black;">ሴ</th><th style="border: 1px solid black;">ድ</th>
                <th style="border: 1px solid black;">ወ</th><th style="border: 1px solid black;">ሴ</th><th style="border: 1px solid black;">ድ</th>
                <th style="border: 1px solid black;">ወ</th><th style="border: 1px solid black;">ሴ</th><th style="border: 1px solid black;">ድ</th>
                <th style="border: 1px solid black;">ወ</th><th style="border: 1px solid black;">ሴ</th><th style="border: 1px solid black;">ድ</th>
                <th style="border: 1px solid black;">ወ</th><th style="border: 1px solid black;">ሴ</th><th style="border: 1px solid black;">ድ</th>
                <th style="border: 1px solid black;">ወ</th><th style="border: 1px solid black;">ሴ</th><th style="border: 1px solid black;">ድ</th>
                <th style="border: 1px solid black;">ወ</th><th style="border: 1px solid black;">ሴ</th><th style="border: 1px solid black;">ድ</th>
                <th style="border: 1px solid black;">ወ</th><th style="border: 1px solid black;">ሴ</th><th style="border: 1px solid black;">ድ</th>
                <th style="border: 1px solid black;">ወ</th><th style="border: 1px solid black;">ሴ</th><th style="border: 1px solid black;">ድ</th>
            </tr>
        </thead>
        <tbody id="stBody">
            </tbody>
    </table>

    <div style="margin-top: 20px; font-weight: bold; font-size: 14px;">
        <p>መ/ር ደለለኝ አጥላው</p>
        <p>ፊርማ፡ ___________________</p>
        <p>ቀን፡ _____________________</p>
    </div>
</div>

<script>
function runStat() {
    const grades = ["1A", "1B", "2A", "2B", "3A", "4A", "5A", "6A"];
    const ranges = [
        { min: 0, max: 49.9 },
        { min: 50, max: 74.9 },
        { min: 75, max: 84.9 },
        { min: 85, max: 100 }
    ];

    let html = "";
    grades.forEach(g => {
        let d = sts.filter(s => s.g === g || s.g === g.replace('A','ኛ ሀ').replace('B','ኛ ለ'));
        
        let mT = d.filter(s => s.s.startsWith('M') || s.s.startsWith('ወ')).length;
        let fT = d.filter(s => s.s.startsWith('F') || s.s.startsWith('ሴ')).length;
        let dT = mT + fT;

        html += `<tr><td style="border: 2px solid black; font-weight:bold;">${g}</td>
                 <td style="border: 1px solid black;">${mT}</td><td style="border: 1px solid black;">${fT}</td><td style="border: 1px solid black;">${dT}</td>`;

        ranges.forEach(r => {
            let mw = d.filter(s => (s.s.startsWith('M')||s.s.startsWith('ወ')) && s.t >= r.min && s.t <= r.max).length;
            let ms = d.filter(s => (s.s.startsWith('F')||s.s.startsWith('ሴ')) && s.t >= r.min && s.t <= r.max).length;
            let md = mw + ms;
            
            // ቁጥር
            html += `<td style="border: 1px solid black;">${mw}</td><td style="border: 1px solid black;">${ms}</td><td style="border: 1px solid black;">${md}</td>`;
            // ፐርሰንት (%)
            html += `<td style="border: 1px solid black;">${mT?((mw/mT)*100).toFixed(0):0}%</td>
                     <td style="border: 1px solid black;">${fT?((ms/fT)*100).toFixed(0):0}%</td>
                     <td style="border: 1px solid black;">${dT?((md/dT)*100).toFixed(0):0}%</td>`;
        });
        html += `</tr>`;
    });
    document.getElementById('stBody').innerHTML = html;
}
</script>
