<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የውጤት ማሳያ - ጣይቱ ብጡል አካዳሚ</title>
    <style>
        :root {
            --aqua: #00FFFF;
            --seafoam: #7FFFD4;
            --gold: #FFD700;
            --dark-card: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #060c1a;
            color: var(--aqua);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* ዋናው የውጤት ማሳያ ሳጥን (Result & Comment Box) */
        .result-container {
            width: 90%;
            max-width: 550px;
            background: var(--dark-card);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--aqua);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            text-align: center;
        }

        .header-label {
            color: var(--gold);
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* የውጤት መጫኛ ሳጥን (The Score Box) */
        .score-display {
            background: rgba(127, 255, 212, 0.1);
            border: 3px solid var(--seafoam);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
        }

        .score-text {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--seafoam); /* በሳጥን ውስጥ ውኃ አረንጓዴ */
            margin: 0;
        }

        .score-label {
            color: var(--aqua);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* የመምህሩ አስተያየት ሳጥን (Teacher's Comment Box) */
        .comment-section {
            margin-top: 25px;
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--gold);
        }

        .comment-title {
            color: var(--gold); /* ወርቃማ */
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .comment-text {
            color: var(--seafoam); /* በሳጥን ውስጥ ውኃ አረንጓዴ */
            font-size: 1.1rem;
            line-height: 1.5;
            font-style: italic;
        }

        /* የጭነት ምልክት (Loading Animation) - ለተጨማሪ ውበት */
        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            40% { color: var(--gold); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .25em 0 0 var(--gold), .5em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .25em 0 0 var(--gold), .5em 0 0 var(--gold); }
        }
    </style>
</head>
<body>

    <div class="result-container">
        <div class="header-label">የተማሪው የውጤት መረጃ</div>
        
        <!-- ውጤት -->
        <div class="score-display">
            <p class="score-label">ጠቅላላ ውጤት</p>
            <h1 class="score-text">88/100</h1>
        </div>

        <!-- የመምህሩ አስተያየት -->
        <div class="comment-section">
            <div class="comment-title">
                <span>✍️</span> የመምህር ደለለኝ አስተያየት
            </div>
            <div class="comment-text">
                "በጣም ጎበዝ ተማሪ ነህ! በተለይ በቃላት አጠቃቀምህ ላይ ያሳየኸው መሻሻል የሚደነቅ ነው። በሚቀጥለው ፈተና ደግሞ በጽሕፈት ላይ ብትበረታ ይበልጥ ውጤታማ ትሆናለህ።"
            </div>
        </div>

        <p style="font-size: 0.8rem; margin-top: 20px; opacity: 0.6; color: var(--gold);">
            መረጃው የተጫነው ከጣይቱ ብጡል አካዳሚ ዳታቤዝ ነው <span class="loading-dots"></span>
        </p>
    </div>

</body>
</html>
