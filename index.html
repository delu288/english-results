<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የተማሪዎች ውጤት መጠየቂያ - ጣይቱ ብጡል አካዳሚ</title>
    <style>
        :root {
            --aqua: #00FFFF;       /* ውኃ ሰማያዊ (ከሳጥን ውጭ) */
            --seafoam: #7FFFD4;    /* ውኃ አረንጓዴ (በሳጥን ውስጥ) */
            --gold: #FFD700;       /* ወርቃማ (ለመምህሩ ስም) */
            --bg-dark: #060c1a;    /* ጥቁር ሰማያዊ ዳራ */
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--aqua);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ርዕስ (Header) */
        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 3px solid var(--gold);
        }

        .school-name { 
            font-size: 3.5rem; 
            color: #00BFFF; 
            margin: 0; 
            font-weight: 900;
            letter-spacing: 2px;
        }

        .teacher-badge { 
            color: var(--gold); 
            font-size: 1.4rem; 
            margin-top: 10px; 
            font-weight: bold;
        }

        /* ውጤት መጠየቂያ ቅጽ (Form Container) */
        .query-card {
            max-width: 600px;
            width: 90%;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 20px;
            border: 1.5px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        h2 { 
            text-align: center; 
            color: var(--aqua); 
            margin-bottom: 30px;
            font-size: 1.8rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--aqua); /* ውኃ ሰማያዊ */
        }

        /* የመፃፊያ ሳጥኖች (Inputs) */
        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1.5px solid var(--aqua);
            border-radius: 12px;
            color: var(--seafoam); /* ውኃ አረንጓዴ */
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }

        input::placeholder {
            color: rgba(127, 255, 212, 0.3);
        }

        /* የውጤት ማሳያ ትልቅ ሳጥን */
        .result-box {
            background: rgba(127, 255, 212, 0.08);
            border: 2px dashed var(--seafoam);
            height: 90px;
            margin-top: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--seafoam); /* ውኃ አረንጓዴ */
        }

        /* ቁልፎች (Buttons) */
        .btn {
            width: 100%;
            padding: 18px;
            margin-top: 25px;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-search {
            background: #00BFFF;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 191, 255, 0.3);
        }

        .btn-search:hover {
            background: var(--aqua);
            color: #000;
            transform: translateY(-2px);
        }

        .btn-comment {
            background: #20B2AA;
            color: white;
            margin-top: 15px;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            opacity: 0.6;
            color: var(--aqua);
        }
    </style>
</head>
<body>

    <header>
        <h1 class="school-name">ጣይቱ ብጡል አካዳሚ</h1>
        <div class="teacher-badge">መ/ር ደለለኝ አጥላው</div>
    </header>

    <div class="query-card">
        <h2>የተማሪዎች ውጤት መጠየቂያ</h2>

        <form>
            <label>የተማሪው ሙሉ ስም፡</label>
            <input type="text" placeholder="ስምዎን እዚህ ያስገቡ...">

            <label>የክፍል ደረጃ፡</label>
            <select>
                <option value="">-- ክፍል ይምረጡ --</option>
                <option>1A</option><option>1B</option>
                <option>2A</option><option>2B</option>
                <option>3A</option><option>4A</option>
                <option>5A</option><option>6A</option>
            </select>

            <label>የትምህርት አይነት፡</label>
            <input type="text" value="ኢንግሊዝኛ (English)" readonly>

            <label>የፈተና ዓይነት፡</label>
            <select>
                <option>ከ 10%</option>
                <option>ከ 20%</option>
                <option>ከ 40%</option>
                <option>ከ 100% (ጠቅላላ)</option>
            </select>

            <button type="button" class="btn btn-search">ውጤቴን አሳይ</button>

            <label>የተገኘ ውጤት፦</label>
            <div class="result-box">-- / --</div>

            <hr style="margin: 40px 0; border: 0.5px solid rgba(0, 255, 255, 0.1);">

            <label>የመምህሩ አስተያየት (Teacher's Comment):</label>
            <textarea rows="2" readonly placeholder="የመምህሩ አስተያየት እዚህ ይታያል..."></textarea>

            <label>የወላጅ አስተያየት (ካለዎት ይፃፉ):</label>
            <textarea rows="2" placeholder="አስተያየትዎን እዚህ ያስፍሩ..."></textarea>
            
            <button type="submit" class="btn btn-comment">አስተያየት ላክ</button>
        </form>
    </div>

    <footer>
        &copy; 2026 ጣይቱ ብጡል አካዳሚ | መ/ር ደለለኝ አጥላው
    </footer>

</body>
</html>
