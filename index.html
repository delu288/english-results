 <!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ጣይቱ ብጡል አካዳሚ</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}
header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 15px;
}
.container {
    width: 90%;
    margin: auto;
    margin-top: 20px;
}
.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0 15px;
}
button {
    background: #4CAF50;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
}
.result-box {
    background: #ecf0f1;
    padding: 15px;
    margin-top: 10px;
}
</style>

</head>
<body>

<header>
<h2>ጣይቱ ብጡል አካዳሚ</h2>
<p>የተማሪዎች ውጤት እና ምዝገባ ስርዓት</p>
</header>

<div class="container">

<!-- ================= RESULT SECTION ================= -->
<div class="card">
<h3>📊 የተማሪ ውጤት</h3>

<label>የወላጅ ስም</label>
<input type="text" id="parent">

<label>የተማሪ ሙሉ ስም</label>
<input type="text" id="student">

<label>ትምህርት</label>
<select id="subject">
<option>አማርኛ</option>
<option>ኢንግሊዝኛ</option>
<option>ሒሳብ</option>
<option>አካባቢ ሳይንስ</option>
<option>ግብረገብነት</option>
<option>ስነጥበባት</option>
<option>ሰውነት ማጎልመሻ</option>
<option>ግዕዝ</option>
<option>ኮምፒውተር</option>
<option>ጀነራል ሳይንስ</option>
<option>ማትስ</option>
<option>ስፖክን</option>
</select>

<label>ውጤት (0-100)</label>
<input type="number" id="score">

<button onclick="calculate()">ውጤት አስላ</button>

<div class="result-box" id="output"></div>

</div>

<!-- ================= REGISTRATION ================= -->
<div class="card">
<h3>📝 የ2017 የትምህርት ዘመን ምዝገባ</h3>

<input type="text" placeholder="የተማሪ ሙሉ ስም">
<select>
<option>ወንድ</option>
<option>ሴት</option>
</select>
<input type="date">
<input type="text" placeholder="ክፍል">
<input type="text" placeholder="ቀድሞ ትምህርት ቤት">

<h4>የወላጅ መረጃ</h4>
<input type="text" placeholder="የወላጅ ስም">
<input type="text" placeholder="+251 9...">
<input type="email" placeholder="Email">
<input type="text" placeholder="አድራሻ">

<h4>አገልግሎቶች</h4>
<label>አውቶቡስ</label>
<select><option>አዎ</option><option>አይ</option></select>

<label>ምሳ</label>
<select><option>አዎ</option><option>አይ</option></select>

<button onclick="sendToTelegram()">ቅጹን ላክ</button>

</div>

</div>

<script>
function calculate(){
    let score = document.getElementById("score").value;
    let grade = "";
    let comment = "";

    if(score >= 80){
        grade = "A";
    } else if(score >= 70){
        grade = "B";
    } else if(score >= 50){
        grade = "C";
    } else {
        grade = "D";
    }

    if(score >= 90){
        comment = "እጅግ በጣም ጥሩ ነው";
    } else if(score >= 80){
        comment = "በጣም ጥሩ ነው";
    } else if(score >= 70){
        comment = "ጥሩ ነው";
    } else if(score >= 60){
        comment = "በቂ";
    } else if(score >= 50){
        comment = "መሻሻል አለበት";
    } else {
        comment = "እገዛ ያስፈልገዋል";
    }

    document.getElementById("output").innerHTML =
        "ውጤት: " + score + "<br>" +
        "ደረጃ: " + grade + "<br>" +
        "ምዘና: " + comment;
}

function sendToTelegram(){
    let url = "https://t.me/del21A";
    window.open(url, "_blank");
}
</script>

</body>
</html>
