<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3498db">
    <title>English Result - መምህር ደለለኝ</title>
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22English%20Result%22,%22short_name%22:%22Result%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#3498db%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/1902/1902633.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <style>
        body { font-family: 'Nyala', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border-top: 8px solid #3498db; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; text-align: center; outline: none; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; }
        button:hover { background: #2980b9; }
        #res { margin-top: 25px; text-align: left; display: none; padding: 20px; border-radius: 12px; background: #f9f9f9; border-left: 6px solid #2ecc71; }
        .install-btn { background: #2ecc71; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <button id="installApp" class="install-btn">አፑን ስልክዎ ላይ ይጫኑ (Install)</button>
    <div style="font-size: 50px; margin-bottom: 10px;">📚</div>
    <h2>የውጤት መፈለጊያ</h2>
    <p>መለያ ቁጥርዎን (ID) ያስገቡ</p>
    <input type="number" id="idInput" placeholder="ለምሳሌ፡ 1">
    <button onclick="search()">ውጤት አሳይ</button>
    <div id="res"></div>
</div>

<script>
    const studentData = [
        { id: "1", name: "አቤል ወርቁ", score: "99", rank: "2ኛ", comment: "Keep it up!" },
        { id: "2", name: "ናታን አንድነት", score: "100", rank: "1ኛ", comment: "Great job!" },
        { id: "3", name: "አሜን ተክሌ", score: "98", rank: "3ኛ", comment: "Smart!" },
        { id: "4", name: "ገነት ፍርዴ", score: "98", rank: "3ኛ", comment: "Smart!" },
        { id: "5", name: "ባሮክ ዲቤ", score: "67", rank: "5ኛ", comment: "Good!" }
    ];

    function search() {
        const id = document.getElementById('idInput').value.trim();
        const resDiv = document.getElementById('res');
        const student = studentData.find(s => s.id === id);
        resDiv.style.display = "block";
        if (student) {
            resDiv.innerHTML = `<p><b>ስም፦</b> ${student.name}</p><p><b>ውጤት፦</b> <span style="color:#2ecc71; font-weight:bold;">${student.score}%</span></p><p><b>ደረጃ፦</b> ${student.rank}</p><p><b>አስተያየት፦</b> <br><i>"${student.comment}"</i></p>`;
        } else {
            resDiv.innerHTML = "<b style='color:#e74c3c;'>መለያ ቁጥር " + id + " አልተገኘም!</b>";
        }
    }

    // አፑን የመጫኛ (Install) ኮድ
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installApp').style.display = 'block';
    });

    document.getElementById('installApp').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('installApp').style.display = 'none';
            }
        }
    });
</script>
</body>
</html>
