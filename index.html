<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - English Result</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --main-bg: #f0f4f8;
            --box-color: #ffffff;
            --primary-blue: #00BFFF;
            --gold: #FFD700;
            --dark-blue: #003366;
            --thick-border: 5px solid #003366;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--main-bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* 3D Headers */
        .header-section { text-align: center; margin-bottom: 40px; }
        
        .school-name {
            font-size: 4rem;
            color: var(--primary-blue);
            text-shadow: 3px 3px 0px #fff, 6px 6px 0px rgba(0,0,0,0.1);
            font-weight: 900;
            margin: 0;
        }

        .subject-tag { color: #ff4500; font-size: 2.5rem; font-weight: bold; display: block; }

        .teacher-name {
            font-size: 2rem;
            color: var(--gold);
            text-shadow: 2px 2px 4px #000;
            margin-top: 5px;
        }

        /* Navigation in Corners */
        .nav-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: var(--dark-blue);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* Thick Boxes Design */
        .main-container {
            max-width: 950px;
            margin: auto;
            background: var(--box-color);
            border: var(--thick-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .input-group {
            border: 3px solid var(--primary-blue);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .action-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .gallery-item {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border: 3px solid var(--gold);
            border-radius: 8px;
        }

        .hidden { display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 2px solid var(--dark-blue); padding: 12px; text-align: center; }
        th { background: var(--primary-blue); color: white; }

        @media print { .nav-container, .action-btn { display: none; } }
    </style>
</head>
<body id="pageBody">

    <div class="nav-container">
        <button class="nav-btn" onclick="showPage('userPage')">የተማሪዎች ገፅ</button>
        <button class="nav-btn" onclick="showPage('adminPage')">የአድሚን ገፅ</button>
    </div>

    <div class="header-section">
        <h1 class="school-name">ጣይቱ ብጡል አካዳሚ</h1>
        <span class="subject-tag">English</span>
        <h2 class="teacher-name">መ/ር ደለለኝ አጥላው</h2>
    </div>

    <div class="main-container">
        
        <div id="userPage">
            <div class="input-group">
                <h3 style="color: var(--dark-blue);">የውጤት መጠየቂያ</h3>
                <input type="text" id="searchName" placeholder="ሙሉ ስምዎን ያስገቡ...">
                <select id="userGrade">
                    <option value="">ክፍል ይምረጡ</option>
                    <option>1ኛ ሀ</option><option>1ኛ ለ</option><option>2ኛ ሀ</option>
                    <option>2ኛ ለ</option><option>3ኛ</option><option>4ኛ</option>
                    <option>5ኛ</option><option>6ኛ</option>
                </select>
                <button class="action-btn" onclick="askResult()">ውጤት መጠየቂያ</button>
            </div>

            <div id="resultBox" class="hidden input-group" style="background: #e7f3ff;">
                <div id="resultOutput"></div>
                <hr>
                <h4>የወላጅ አስተያየት መላኪያ</h4>
                <textarea id="pMsg" placeholder="መልዕክትዎን እዚህ ይጻፉ..."></textarea>
                <button class="action-btn" style="background: #007bff;" onclick="sendToAdmin()">መልዕክት ላክ</button>
            </div>
        </div>

        <div id="adminPage" class="hidden">
            <div id="adminLogin" class="input-group">
                <h3>አድሚን መግቢያ</h3>
                <input type="password" id="adminKey" placeholder="የይለፍ ቃል ያስገቡ">
                <button class="action-btn" onclick="accessAdmin()">ግባ</button>
            </div>

            <div id="adminTools" class="hidden">
                <button onclick="changeBg()" style="margin-bottom: 10px;">የገፅ ቀለም ቀይር</button>
                
                <div class="input-group">
                    <h4>ተማሪ በዶኩመንት መጫኛ (Excel)</h4>
                    <input type="file" id="excelUpload" accept=".xlsx, .xls">
                </div>

                <div class="input-group">
                    <h4>ፎቶ ጋለሪ</h4>
                    <input type="file" id="imgUpload" accept="image/*" multiple onchange="addGallery(event)">
                    <div id="galDisplay" class="gallery-grid"></div>
                </div>

                <div class="input-group">
                    <h4>የውጤት ትንተና (XLS)</h4>
                    <table id="statTable">
                        <thead>
                            <tr><th>ደረጃ</th><th>ወንድ</th><th>ሴት</th><th>ድምር</th></tr>
                        </thead>
                        <tbody id="statBody"></tbody>
                    </table>
                    <br>
                    <button class="action-btn" style="background: #1d6f42;" onclick="downloadExcel()">ትንተናውን ወደ Excel አውርድ</button>
                </div>

                <div class="input-group">
                    <h4>የወላጆች መልዕክት (Inbox)</h4>
                    <div id="inbox"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('st_data')) || [];
        let inbox = JSON.parse(localStorage.getItem('inbox_data')) || [];
        let gallery = JSON.parse(localStorage.getItem('gal_data')) || [];

        function showPage(p) {
            document.getElementById('userPage').classList.toggle('hidden', p !== 'userPage');
            document.getElementById('adminPage').classList.toggle('hidden', p !== 'adminPage');
        }

        function accessAdmin() {
            if(document.getElementById('adminKey').value === "taitu123") {
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminTools').classList.remove('hidden');
                renderStats();
                renderGallery();
                renderInbox();
            } else { alert("የተሳሳተ የይለፍ ቃል!"); }
        }

        // Excel Upload Logic
        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                
                students = rows.map(r => ({
                    name: r.Name || r.ስም,
                    sex: r.Sex || r.ጾታ,
                    grade: r.Grade || r.ክፍል,
                    total: (r.Notebook||0) + (r.Quiz1||0) + (r.Quiz2||0) + (r.Mid||0) + (r.Final||0),
                    note: r.Note || r.አስተያየት
                }));
                localStorage.setItem('st_data', JSON.stringify(students));
                alert("መረጃው ተጭኗል!");
                renderStats();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function askResult() {
            let name = document.getElementById('searchName').value.trim();
            let found = students.find(s => s.name.toLowerCase() === name.toLowerCase());
            if(found) {
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('resultOutput').innerHTML = `
                    <h3>የውጤት ዝርዝር</h3>
                    <p><b>ተማሪ፦</b> ${found.name}</p>
                    <p><b>ድምር ውጤት፦</b> ${found.total}%</p>
                    <p><b>መምህሩ ያለው፦</b> ${found.note}</p>
                `;
            } else { alert("ይህ ስም አልተመዘገበም!"); }
        }

        function renderStats() {
            let ranges = [
                {l: "ከ 50% በታች", min: 0, max: 49},
                {l: "50% - 74%", min: 50, max: 74},
                {l: "75% - 84%", min: 75, max: 84},
                {l: "85% - 100%", min: 85, max: 100}
            ];
            document.getElementById('statBody').innerHTML = ranges.map(r => {
                let m = students.filter(s => s.sex==='M' && s.total >= r.min && s.total <= r.max).length;
                let f = students.filter(s => s.sex==='F' && s.total >= r.min && s.total <= r.max).length;
                return `<tr><td>${r.l}</td><td>${m}</td><td>${f}</td><td>${m+f}</td></tr>`;
            }).join('');
        }

        function downloadExcel() {
            let wb = XLSX.utils.table_to_book(document.getElementById("statTable"));
            XLSX.writeFile(wb, "Taitu_Academy_Analysis.xlsx");
        }

        function addGallery(e) {
            for(let f of e.target.files) {
                let r = new FileReader();
                r.onload = (ev) => {
                    gallery.push(ev.target.result);
                    localStorage.setItem('gal_data', JSON.stringify(gallery));
                    renderGallery();
                };
                r.readAsDataURL(f);
            }
        }

        function renderGallery() {
            document.getElementById('galDisplay').innerHTML = gallery.map(src => `<img src="${src}" class="gallery-item">`).join('');
        }

        function sendToAdmin() {
            inbox.push({from: document.getElementById('searchName').value, msg: document.getElementById('pMsg').value});
            localStorage.setItem('inbox_data', JSON.stringify(inbox));
            alert("መልዕክቱ ተልኳል!");
        }

        function renderInbox() {
            document.getElementById('inbox').innerHTML = inbox.map(i => `<p><b>${i.from}፦</b> ${i.msg}</p>`).join('');
        }

        function changeBg() {
            const colors = ['#f0f4f8', '#e8f5e9', '#fff3e0', '#f3e5f5'];
            document.body.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        }
    </script>
</body>
</html>
