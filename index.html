<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የጥያቄና መልስ ውድድር ውጤት መያዣ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 10px; font-size: 12px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 15px; }
        
        .timer-container { text-align: center; margin-bottom: 15px; background: #fff; border: 2px solid #1a73e8; padding: 10px; border-radius: 50px; display: inline-block; position: relative; left: 50%; transform: translateX(-50%); }
        #timer-display { font-size: 2.2rem; font-weight: bold; color: #d93025; min-width: 110px; display: inline-block; }
        .timer-btn { padding: 8px 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; margin: 0 5px; color: white; }
        
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .input-box { border: 1px solid #bdc1c6; padding: 8px; border-radius: 6px; background: #fff; display: flex; align-items: center; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #dadce0; padding: 4px; text-align: center; }
        th { background-color: #1a73e8; color: white; font-size: 11px; }
        
        /* ------------------------------------------- */
        /* አቀባዊ (Vertical) አቀማመጥ ለየእጣ ቁጥሮቹ */
        .vertical-row { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
            padding: 5px 0;
        }
        .item-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        /* ------------------------------------------- */

        .eta-input { width: 30px; border: 1px solid #ccc; text-align: center; font-size: 11px; padding: 2px; border-radius: 3px; }
        .touch-cell { cursor: pointer; font-size: 18px; font-weight: bold; width: 45px; height: 35px; border: 1px solid #eee; border-radius: 4px; background: #fff; user-select: none; display: flex; align-items: center; justify-content: center; }
        
        .status-right { background: #e6f4ea; color: #1e8e3e; border-color: #1e8e3e; }
        .status-wrong { background: #fce8e6; color: #d93025; border-color: #d93025; }

        .footer-sigs { margin-top: 30px; display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 15px; }
        .sig-box { width: 48%; line-height: 2.8; font-size: 13px; }
        .judge-select { width: 65%; padding: 4px; border: 1px solid #ccc; font-weight: bold; }

        .final-actions { text-align: center; margin-top: 25px; }
        .action-btn { padding: 10px 25px; border-radius: 5px; border: none; color: white; cursor: pointer; font-weight: bold; margin: 5px; }

        @media print {
            .final-actions, .timer-container, .add-row-btn { display: none; }
            .container { box-shadow: none; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>የጥያቄና መልስ ውድድር ውጤት መያዣ</h2>

    <div class="timer-container">
        <div id="timer-display">00:00</div>
        <br>
        <button class="timer-btn" style="background:#1e8e3e;" onclick="startTimer()">ጀምር</button>
        <button class="timer-btn" style="background:#d93025;" onclick="stopTimer()">ቁም</button>
        <button class="timer-btn" style="background:#f0ad4e;" onclick="resetTimer()">ቀይር</button>
    </div>

    <div class="info-grid">
        <div class="input-box">ቀን፡ <input type="date" style="border:none; width:80%"></div>
        <div class="input-box">ክፍል፡ 
            <select style="border:none; width:80%; font-weight:bold;">
                <option>1ኛ ሀ</option><option>1ኛ ለ</option><option>2ኛ ሀ</option><option>2ኛ ለ</option>
                <option>3ኛ ሀ</option><option>4ኛ ሀ</option><option>5ኛ ሀ</option><option>6ኛ ሀ</option>
            </select>
        </div>
        <div class="input-box">ሴሚስተር፡ 
            <select style="border:none; width:80%; font-weight:bold;">
                <option>1ኛ ሴሚስተር</option><option>2ኛ ሴሚስተር</option>
            </select>
        </div>
    </div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th style="width:30px">ቁጥር</th>
                <th style="width:160px">የተወዳዳሪዎች ስም</th>
                <th>አማርኛ (እጣ 1&2)</th>
                <th>እንግሊዝኛ (እጣ 1&2)</th>
                <th>ሒሳብ (እጣ 1&2)</th>
                <th>አ/ሳይንስ (እጣ 1&2)</th>
                <th>ግብረገብ (እጣ 1&2)</th>
                <th style="width:75px">ድምር (10)</th>
                <th style="width:65px">ደረጃ</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td><input type="text" style="width:95%; border:none; outline:none;" placeholder="ስም ያስገቡ"></td>
                <td>
                    <div class="vertical-row">
                        <div class="item-row"><input type="text" placeholder="እጣ 1" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                        <div class="item-row"><input type="text" placeholder="እጣ 2" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                    </div>
                </td>
                <td>
                    <div class="vertical-row">
                        <div class="item-row"><input type="text" placeholder="እጣ 1" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                        <div class="item-row"><input type="text" placeholder="እጣ 2" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                    </div>
                </td>
                <td>
                    <div class="vertical-row">
                        <div class="item-row"><input type="text" placeholder="እጣ 1" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                        <div class="item-row"><input type="text" placeholder="እጣ 2" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                    </div>
                </td>
                <td>
                    <div class="vertical-row">
                        <div class="item-row"><input type="text" placeholder="እጣ 1" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                        <div class="item-row"><input type="text" placeholder="እጣ 2" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                    </div>
                </td>
                <td>
                    <div class="vertical-row">
                        <div class="item-row"><input type="text" placeholder="እጣ 1" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                        <div class="item-row"><input type="text" placeholder="እጣ 2" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                    </div>
                </td>
                <td class="grand-total" style="font-weight:bold; font-size:15px; color:#1a73e8;">0/10</td>
                <td class="rank" style="font-weight:bold; font-size:15px;">-</td>
            </tr>
        </tbody>
    </table>

    <button class="add-row-btn action-btn" style="background:#1a73e8;" onclick="addRow()">+ ተማሪ ጨምር</button>

    <div class="footer-sigs">
        <div class="sig-box">
            1ኛ ዳኛ፡ <select class="judge-select">
                <option value="">ምረጥ...</option>
                <option>መ/ር ደለለኝ አጥላው</option><option>መ/ር ዳዊት የማነ</option><option>መ/ር ባየልኝ አይተንፍሱ</option>
                <option>መ/ር ተፈሪ ታደሰ</option><option>መ/ር እሸቱ አለሙ</option><option>መ/ር አሰጋኸኝ በሻህ</option>
                <option>መ/ር ተፈራ ፈቀደው</option><option>መ/ርት መሰረት ፋንታ</option><option>መ/ርት መሰረት ግዛቸው</option>
                <option>ር/መ/ር አማረ አሰፋ</option>
            </select><br>
            2ኛ ዳኛ፡ <select class="judge-select">
                <option value="">ምረጥ...</option>
                <option>መ/ር ደለለኝ አጥላው</option><option>መ/ር ዳዊት የማነ</option><option>መ/ር ባየልኝ አይተንፍሱ</option>
                <option>መ/ር ተፈሪ ታደሰ</option><option>መ/ር እሸቱ አለሙ</option><option>መ/ር አሰጋኸኝ በሻህ</option>
                <option>መ/ር ተፈራ ፈቀደው</option><option>መ/ርት መሰረት ፋንታ</option><option>መ/ርት መሰረት ግዛቸው</option>
                <option>ር/መ/ር አማረ አሰፋ</option>
            </select>
        </div>
        <div class="sig-box">
            ሰብሳቢ፡ <b>መ/ር ደለለኝ አጥላው</b><br>
            ፀሀፊ፡ <b>መ/ርት መሰረት ፋንታ</b>
        </div>
    </div>

    <div class="final-actions">
        <button class="action-btn" style="background:#1a73e8;" onclick="window.print()">🖨️ Print (አትም)</button>
    </div>
</div>

<script>
    let timerInterval;
    let seconds = 0;

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('timer-display').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }, 1000);
    }
    function stopTimer() { clearInterval(timerInterval); }
    function resetTimer() { stopTimer(); seconds = 0; document.getElementById('timer-display').innerText = "00:00"; }

    function toggleTouch(cell) {
        if (cell.innerHTML === "") { cell.innerHTML = "✓"; cell.className = "touch-cell status-right"; }
        else if (cell.innerHTML === "✓") { cell.innerHTML = "X"; cell.className = "touch-cell status-wrong"; }
        else { cell.innerHTML = ""; cell.className = "touch-cell"; }
        calculateResults();
    }

    function addRow() {
        let table = document.getElementById("resultsTable").getElementsByTagName('tbody')[0];
        let rowCount = table.rows.length;
        let row = table.insertRow(rowCount);
        let cellHTML = `<td>${rowCount + 1}</td><td><input type="text" style="width:95%; border:none; outline:none;" placeholder="ስም ያስገቡ"></td>`;
        for(let i=0; i<5; i++) {
            cellHTML += `<td>
                            <div class="vertical-row">
                                <div class="item-row"><input type="text" placeholder="እጣ 1" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                                <div class="item-row"><input type="text" placeholder="እጣ 2" class="eta-input"><div class="touch-cell" onclick="toggleTouch(this)"></div></div>
                            </div>
                         </td>`;
        }
        cellHTML += `<td class="grand-total" style="font-weight:bold; font-size:15px; color:#1a73e8;">0/10</td><td class="rank" style="font-weight:bold; font-size:15px;">-</td>`;
        row.innerHTML = cellHTML;
    }

    function calculateResults() {
        let rows = document.getElementById("resultsTable").getElementsByTagName('tbody')[0].rows;
        let scores = [];
        for (let i = 0; i < rows.length; i++) {
            let touchCells = rows[i].getElementsByClassName('touch-cell');
            let correct = 0;
            for (let cell of touchCells) { if (cell.innerHTML === "✓") correct++; }
            rows[i].getElementsByClassName('grand-total')[0].innerText = correct + "/10";
            scores.push({ index: i, score: correct });
        }
        scores.sort((a, b) => b.score - a.score);
        scores.forEach((item, idx) => {
            rows[item.index].getElementsByClassName('rank')[0].innerText = (idx + 1) + "ኛ";
        });
    }
</script>

</body>
</html>
