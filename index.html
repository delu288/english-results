<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የውጤት መቆጣጠሪያ - መ/ር ደለለኝ አጥላው</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #1e3a8a;
            --accent-gold: #d4af37;
            --soft-bg: #f8fafc;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: #1e293b;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border-top: 15px solid var(--main-blue);
            text-align: center;
        }

        /* የመምህሩ ስም ማሳያ */
        .teacher-badge {
            background: var(--main-blue);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);
        }

        .teacher-badge h1 {
            margin: 0;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .school-tag {
            color: var(--accent-gold);
            font-size: 18px;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--main-blue);
            font-size: 15px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 17px;
            background: #f1f5f9;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent-gold);
            outline: none;
            background: white;
        }

        .btn-search {
            background: var(--main-blue);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-search:hover {
            background: #152a61;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* የውጤት ካርድ */
        #result-card {
            display: none;
            margin-top: 35px;
            padding: 25px;
            background: #fff;
            border-radius: 20px;
            border: 2px solid #f1f5f9;
            text-align: left;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-line {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f1f5f9;
        }

        .res-label { font-weight: bold; color: #64748b; font-size: 14px; text-transform: uppercase; }
        .res-data { display: block; font-size: 19px; color: var(--main-blue); font-weight: 700; }
        .score-big { font-size: 32px; color: #10b981; }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="teacher-badge">
        <h1>መ/ር ደለለኝ አጥላው</h1>
        <span class="school-tag">ጣይቱ ብጡል አካዳሚ</span>
    </div>

    <div style="background: #fffbeb; padding: 15px; border-radius: 15px; border: 1px dashed #d4af37; margin-bottom: 25px;">
        <label>የExcel (CSV) ፋይል ይጫኑ</label>
        <input type="file" id="csvUpload" accept=".csv" style="font-size: 13px;">
    </div>

    <div class="input-group">
        <label>የተማሪው ሙሉ ስም</label>
        <input type="text" id="nameInput" placeholder="ለምሳሌ፡ አበበ ከበደ">
    </div>

    <div class="input-group">
        <label>የክፍል ደረጃ</label>
        <select id="gradeInput">
            <option value="">-- ክፍል ይምረጡ --</option>
            <option value="1A">1A</option>
            <option value="1B">1B</option>
            <option value="2A">2A</option>
            <option value="2B">2B</option>
            <option value="3A">3A</option>
            <option value="4A">4A</option>
            <option value="5A">5A</option>
            <option value="6A">6A</option>
        </select>
    </div>

    <button class="btn-search" onclick="searchResult()">ውጤት አሳይ</button>

    <div id="result-card">
        <div class="res-line"><span class="res-label">ተማሪ</span><span class="res-data" id="outName"></span></div>
        <div class="res-line"><span class="res-label">ክፍል</span><span class="res-data" id="outGrade"></span></div>
        <div class="res-line"><span class="res-label">ውጤት</span><span class="res-data score-big" id="outScore"></span></div>
        <div class="res-line" style="border:none;"><span class="res-label">አስተያየት</span><span class="res-data" id="outComment" style="font-style: italic; font-weight: 400; font-size: 16px;"></span></div>
    </div>

    <p id="errorBox" style="color: #ef4444; display: none; margin-top: 20px; font-weight: bold;">⚠️ ይቅርታ፣ መረጃው አልተገኘም። ስሙን እና ክፍሉን በትክክል መምረጥዎን ያረጋግጡ።</p>

    <div class="footer">
        እንግሊዝኛ (English) | 2018 ዓ.ም የውጤት ሪፖርት
    </div>
</div>

<script>
    let studentDatabase = [];

    // ፋይሉን የማንበብ ሂደት
    document.getElementById('csvUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const rows = event.target.result.split('\n');
            studentDatabase = rows.slice(1).map(row => {
                const cols = row.split(',');
                if(cols.length >= 4) {
                    return {
                        name: cols[0].trim(),
                        grade: cols[1].trim(),
                        score: cols[2].trim(),
                        comment: cols[3].trim()
                    };
                }
            }).filter(item => item !== undefined);
            alert("የተማሪዎች ዝርዝር በተሳካ ሁኔታ ተጭኗል!");
        };
        reader.readAsText(file);
    });

    function searchResult() {
        const nameQuery = document.getElementById('nameInput').value.trim();
        const gradeQuery = document.getElementById('gradeInput').value;
        const card = document.getElementById('result-card');
        const err = document.getElementById('errorBox');

        // በስም እና በክፍል መፈለግ
        const student = studentDatabase.find(s => s.name === nameQuery && s.grade === gradeQuery);

        if(student) {
            document.getElementById('outName').innerText = student.name;
            document.getElementById('outGrade').innerText = student.grade;
            document.getElementById('outScore').innerText = student.score;
            document.getElementById('outComment').innerText = student.comment;
            card.style.display = 'block';
            err.style.display = 'none';
        } else {
            card.style.display = 'none';
            err.style.display = 'block';
        }
    }
</script>

</body>
</html>
