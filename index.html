<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የውድድር መቆጣጠሪያ ገጽ</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .timer-section {
            background: #2c3e50;
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
        }
        #timer {
            font-size: 5rem;
            font-family: monospace;
            margin-bottom: 20px;
            display: block;
            color: #2ecc71;
        }
        .controls button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            margin: 5px;
            transition: 0.3s;
        }
        .start-btn { background-color: #27ae60; color: white; }
        .stop-btn { background-color: #e74c3c; color: white; }
        .reset-btn { background-color: #f39c12; color: white; }

        .results-section {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { color: #34495e; text-align: center; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #3498db; color: white; }
        tr:hover { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <!-- የሰዓት ክፍል -->
    <div class="timer-section">
        <h2>የውድድር ሰዓት</h2>
        <span id="timer">00:00</span>
        <div class="controls">
            <button class="start-btn" onclick="startTimer()">ጀምር</button>
            <button class="stop-btn" onclick="stopTimer()">አቁም</button>
            <button class="reset-btn" onclick="resetTimer()">እንደገና</button>
        </div>
    </div>

    <!-- የውጤት ሰንጠረዥ ክፍል -->
    <div class="results-section">
        <h2>የተወዳዳሪዎች ውጤት</h2>
        <table>
            <thead>
                <tr>
                    <th>ተ.ቁ</th>
                    <th>የተወዳዳሪ ስም</th>
                    <th>ውጤት</th>
                    <th>ደረጃ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>ተማሪ 1</td>
                    <td>---</td>
                    <td>---</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>ተማሪ 2</td>
                    <td>---</td>
                    <td>---</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        let counter;
        let seconds = 0;
        let isRunning = false;

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            counter = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                document.getElementById('timer').textContent = 
                    (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(counter);
            isRunning = false;
        }

        function resetTimer() {
            stopTimer();
            seconds = 0;
            document.getElementById('timer').textContent = "00:00";
        }
    </script>

</body>
</html>
