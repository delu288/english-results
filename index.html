<!DOCTYPE html>
<html lang="am" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የጥያቄና መልስ ውድድር ውጤት መያዣ</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .main-container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        
        /* የተስተካከለው አነስተኛ ቲመር */
        .timer-section { 
            background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px; 
            width: 240px; margin: 15px auto; padding: 10px; text-align: center;
        }
        #timer-display { font-size: 2.2rem; font-weight: bold; color: #d93025; font-family: monospace; margin: 5px 0; }
        .timer-btns button { cursor: pointer; border: none; border-radius: 4px; padding: 6px 10px; font-size: 0.85rem; transition: 0.2s; }
        .opt-btn { background: #17a2b8; color: white; margin-bottom: 8px; }
        .start-btn { background: #28a745; color: white; }
        .stop-btn { background: #f4b400; color: white; }
        .reset-btn { background: #ea4335; color: white; }
        
        /* ሰንጠረዥ */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #bdc3c7; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; }
        input[type="text"], input[type="number"] { width: 90%; padding: 5px; border: 1px solid #ddd; }

        .footer { margin-top: 30px; border-top: 2px solid #eee; padding-top: 15px; line-height: 1.6; }
        .actions { text-align: center; margin-top: 20px; }
        .actions button { padding: 10px 25px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: none; margin: 5px; }

        @media print { .timer-section, .actions { display: none; } }
    </style>
</head>
<body>

<div class="main-container">
    <h2>የጥያቄና መልስ ውድድር ውጤት መያዣ</h2>

    <div class="timer-section">
        <div style="font-size: 0.9rem; font-weight: bold; color: #555;">የጥያቄ ሰዓት</div>
        <div id="timer-display">01:00</div>
        <div class="timer-btns">
            <button class="opt-btn" onclick="setTimer(60)">1 ደቂቃ</button>
            <button class="opt-btn" onclick="setTimer(120)">2 ደቂቃ</button>
            <br>
            <button class="start-btn" onclick="startCountdown()">ጀምር</button>
            <button class="stop-btn" onclick="stopCountdown()">ቁም</button>
            <button class="reset-btn" onclick="resetCountdown()">ቀይር</button>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; margin-top: 20px;">
        <p>ቀን፡ <input type="date"></p>
        <p>ክፍል፡ 
            <select>
                <option>1ኛ ሀ</option><option>1ኛ ለ</option>
                <option>2ኛ ሀ</option><option>2ኛ ለ</option>
                <option>3ኛ ሀ</option><option>4ኛ ሀ</option>
            </select>
        </p>
        <p>ሴሚስተር፡ 
            <select>
                <option>1ኛ ሴሚስተር</option><option>2ኛ ሴሚስተር</option>
            </select>
        </p>
    </div>

    <table>
        <thead>
            <tr>
                <th>ተ.ቁ</th>
                <th>ተማሪ ስም</th>
                <th>አማርኛ</th>
                <th>እንግሊዝኛ</th>
                <th>ሒሳብ</th>
                <th>አ/ሳይንስ</th>
                <th>ድምር</th>
                <th>ደረጃ</th>
            </tr>
        </thead>
        <tbody id="result-table">
            <tr>
                <td>1</td>
                <td><input type="text" placeholder="የተማሪ ስም"></td>
                <td><input type="number" class="score" oninput="calculateTotal(this)"></td>
                <td><input type="number" class="score" oninput="calculateTotal(this)"></td>
                <td><input type="number" class="score" oninput="calculateTotal(this)"></td>
                <td><input type="number" class="score" oninput="calculateTotal(this)"></td>
                <td class="total-cell">0</td>
                <td><input type="text" style="width: 40px;"></td>
            </tr>
        </tbody>
    </table>

    <div class="actions">
        <button style="background: #1a73e8; color: white;" onclick="alert('ውጤቱ ተመዝግቧል!')">💾 ውጤቱን መዝግብ (Save)</button>
        <button style="background: #5f6368; color: white;" onclick="window.print()">🖨️ አትም (Print)</button>
    </div>

    <div class="footer">
        <p>1ኛ ዳኛ፡ _________________</p>
        <p>2ኛ ዳኛ፡ _________________</p>
        <p>ሰብሳቢ፡ <strong>መ/ር ደለለኝ አጥላው</strong></p>
        <p>ፀሀፊ፡ <strong>መ/ርት መሰረት ፋንታ</strong></p>
    </div>
</div>

<script>
    let timer;
    let timeLeft = 60;
    let isRunning = false;

    function updateView() {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer-display').innerText = 
            `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function setTimer(s) {
        stopCountdown();
        timeLeft = s;
        updateView();
    }

    function startCountdown() {
        if (isRunning) return;
        isRunning = true;
        timer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timer);
                isRunning = false;
                alert("ጊዜው አልቋል!");
            } else {
                timeLeft--;
                updateView();
            }
        }, 1000);
    }

    function stopCountdown() {
        clearInterval(timer);
        isRunning = false;
    }

    function resetCountdown() {
        stopCountdown();
        timeLeft = 60;
        updateView();
    }

    function calculateTotal(el) {
        let row = el.closest('tr');
        let scores = row.querySelectorAll('.score');
        let total = 0;
        scores.forEach(s => total += Number(s.value) || 0);
        row.querySelector('.total-cell').innerText = total;
    }
</script>

</body>
</html>
