<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ውጤት መያዣ - Taitu Bitul Academy</title>
    <style>
        :root { --main: #0d47a1; --accent: #00bcd4; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 11px; }
        .container { max-width: 850px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 6px solid var(--main); }
        
        h2 { text-align: center; color: var(--main); margin-bottom: 15px; font-size: 18px; }

        /* Timer Section */
        .timer-box { text-align: center; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 50px; border: 2px solid var(--main); display: inline-block; position: relative; left: 50%; transform: translateX(-50%); box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        #timer-display { font-size: 1.8rem; font-weight: bold; color: #d32f2f; min-width: 90px; display: inline-block; font-family: monospace; }
        .t-btn { padding: 5px 12px; border-radius: 15px; border: none; cursor: pointer; color: #fff; font-size: 10px; font-weight: bold; margin: 0 2px; transition: 0.2s; }
        .t-btn:active { transform: scale(0.95); }

        .top-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .in-field { border: 1px solid #ccc; padding: 6px; border-radius: 6px; display: flex; align-items: center; background: #fafafa; }

        /* Table Styling - Ultra Compact */
        table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #aaa; table-layout: fixed; }
        th { background: var(--main); color: #fff; font-size: 10px; padding: 8px 2px; border: 1px solid #fff; }
        td { border: 1px solid #ddd; padding: 3px; text-align: center; vertical-align: middle; }
        
        .box-group { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 0; }
        .row-item { display: flex; align-items: center; gap: 3px; }

        /* Input & Checkbox Styles */
        .eta-in { width: 22px; height: 18px; border: 1px solid #999; text-align: center; font-size: 10px; border-radius: 3px; outline: none; }
        .chk-btn { cursor: pointer; width: 26px; height: 24px; border: 1px solid #ddd; border-radius: 4px; background: #fdfdfd; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; transition: 0.1s; }
        
        .correct { background: #e8f5e9 !important; color: #2e7d32; border-color: #2e7d32 !important; }
        .wrong { background: #ffebee !important; color: #c62828; border-color: #c62828 !important; }

        /* Footer & Buttons */
        .sigs { margin-top: 20px; display: flex; justify-content: space-between; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .sig-item { font-size: 11px; line-height: 2.2; }
        .sel-judge { width: 110px; font-size: 10px; font-weight: bold; padding: 2px; }

        .btn-area { text-align: center; margin-top: 20px; }
        .action-btn { padding: 9px 20px; border-radius: 6px; border: none; color: #fff; font-weight: bold; margin: 5px; cursor: pointer; font-size: 12px; box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
        .action-btn:hover { opacity: 0.9; }

        /* Developer Footer */
        .developer-info { margin-top: 30px; text-align: center; font-size: 12px; color: #555; border-top: 1px solid #eee; padding-top: 15px; }
        .developer-info a { color: var(--main); text-decoration: none; font-weight: bold; border-bottom: 1px solid var(--main); padding-bottom: 2px; }

        @media print {
            .btn-area, .timer-box, .add-btn, .developer-info { display: none; }
            .container { box-shadow: none; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>የጥያቄና መልስ ውድድር ውጤት መያዣ</h2>

    <div class="timer-box">
        <div id="timer-display">00:00</div><br>
        <button class="t-btn" style="background:#2e7d32;" onclick="startTimer()">ጀምር</button>
        <button class="t-btn" style="background:#c62828;" onclick="stopTimer()">ቁም</button>
        <button class="t-btn" style="background:#f9a825;" onclick="resetTimer()">ቀይር</button>
    </div>

    <div class="top-info">
        <div class="in-field">📅 ቀን፡ <input type="date" id="qDate" style="border:none; width:80%; background:transparent;"></div>
        <div class="in-field">🏫 ክፍል፡ 
            <select id="qClass" style="border:none; width:80%; font-weight:bold;">
                <option>1ኛ ሀ</option><option>1ኛ ለ</option><option>2ኛ ሀ</option><option>2ኛ ለ</option>
                <option>3ኛ ሀ</option><option>4ኛ ሀ</option><option>5ኛ ሀ</option><option>6ኛ ሀ</option>
            </select>
        </div>
        <div class="in-field">📝 ሴሚ፡ 
            <select style="border:none; width:80%; font-weight:bold;">
                <option>1ኛ ሴሚስተር</option><option>2ኛ ሴሚስተር</option>
            </select>
        </div>
    </div>

    <table id="scoreTable">
        <thead>
            <tr>
                <th style="width:25px">ቁ</th>
                <th style="width:130px">የተወዳዳሪ ስም</th>
                <th>አማርኛ</th><th>እንግሊዝኛ</th><th>ሒሳብ</th><th>አ/ሳይንስ</th><th>ግብረገብ</th>
                <th style="width:50px">ድምር</th><th style="width:45px">ደረጃ</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td><input type="text" class="st-name" style="width:95%; border:none; outline:none;" placeholder="ስም..."></td>
                <script>
                    for(let i=0; i<5; i++){
                        document.write(`<td><div class="box-group">
                            <div class="row-item"><input type="text" class="eta-in"><div class="chk-btn" onclick="toggleChk(this)"></div></div>
                            <div class="row-item"><input type="text" class="eta-in"><div class="chk-btn" onclick="toggleChk(this)"></div></div>
                        </div></td>`);
                    }
                </script>
                <td class="res-total" style="font-weight:bold; color:var(--main);">0/10</td>
                <td class="res-rank" style="font-weight:bold;">-</td>
            </tr>
        </tbody>
    </table>

    <button class="action-btn add-btn" style="background:var(--main); padding:5px 12px; font-size:10px;" onclick="addRow()">+ ተማሪ ጨምር</button>

    <div class="sigs">
        <div class="sig-item">
            👤 1ኛ ዳኛ፡ <select class="sel-judge"><option>ምረጥ...</option><option>መ/ር ደለለኝ አጥላው</option><option>መ/ር ዳዊት የማነ</option><option>መ/ር ባየልኝ አይተንፍሱ</option><option>መ/ር ተፈሪ ታደሰ</option><option>መ/ር እሸቱ አለሙ</option><option>መ/ር አሰጋኸኝ በሻህ</option><option>መ/ር ተፈራ ፈቀደው</option><option>መ/ርት መሰረት ፋንታ</option><option>መ/ርት መሰረት ግዛቸው</option><option>ር/መ/ር አማረ አሰፋ</option></select><br>
            👤 2ኛ ዳኛ፡ <select class="sel-judge"><option>ምረጥ...</option><option>መ/ር ደለለኝ አጥላው</option><option>መ/ር ዳዊት የማነ</option><option>መ/ር ባየልኝ አይተንፍሱ</option><option>መ/ር ተፈሪ ታደሰ</option><option>መ/ር እሸቱ አለሙ</option><option>መ/ር አሰጋኸኝ በሻህ</option><option>መ/ር ተፈራ ፈቀደው</option><option>መ/ርት መሰረት ፋንታ</option><option>መ/ርት መሰረት ግዛቸው</option><option>ር/መ/ር አማረ አሰፋ</option></select>
        </div>
        <div class="sig-item" style="text-align: right;">
            ሰብሳቢ፡ <b>መ/ር ደለለኝ አጥላው</b><br>
            ፀሀፊ፡ <b>መ/ርት መሰረት ፋንታ</b>
        </div>
    </div>

    <div class="btn-area">
        <button class="action-btn" style="background:#2e7d32;" onclick="saveLocal()">💾 Save</button>
        <button class="action-btn" style="background:#6a1b9a;" onclick="shareTxt()">🔗 Share</button>
        <button class="action-btn" style="background:var(--main);" onclick="window.print()">🖨️ Print</button>
    </div>

    <div class="developer-info">
        Developed by: <a href="https://rose-kit-24.tiiny.site" target="_blank">መ/ር ደለለኝ አጥላው</a> | © 2026 Taitu Bitul Academy
    </div>
</div>

<script>
    let timer; let sec = 0;
    function startTimer() { clearInterval(timer); timer = setInterval(() => { sec++; let m = Math.floor(sec/60); let s = sec%60; document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }, 1000); }
    function stopTimer() { clearInterval(timer); }
    function resetTimer() { stopTimer(); sec = 0; document.getElementById('timer-display').innerText = "00:00"; }

    function toggleChk(el) {
        if (el.innerHTML === "") { el.innerHTML = "✓"; el.className = "chk-btn correct"; }
        else if (el.innerHTML === "✓") { el.innerHTML = "X"; el.className = "chk-btn wrong"; }
        else { el.innerHTML = ""; el.className = "chk-btn"; }
        reCalc();
    }

    function addRow() {
        let tbody = document.getElementById("scoreTable").tBodies[0];
        let r = tbody.insertRow();
        let html = `<td>${tbody.rows.length}</td><td><input type="text" class="st-name" style="width:95%; border:none;" placeholder="ስም..."></td>`;
        for(let i=0; i<5; i++){
            html += `<td><div class="box-group"><div class="row-item"><input type="text" class="eta-in"><div class="chk-btn" onclick="toggleChk(this)"></div></div><div class="row-item"><input type="text" class="eta-in"><div class="chk-btn" onclick="toggleChk(this)"></div></div></div></td>`;
        }
        html += `<td class="res-total" style="font-weight:bold; color:var(--main);">0/10</td><td class="res-rank">-</td>`;
        r.innerHTML = html;
    }

    function reCalc() {
        let rows = document.getElementById("scoreTable").tBodies[0].rows;
        let scores = [];
        for (let r of rows) {
            let count = r.getElementsByClassName('correct').length;
            r.querySelector('.res-total').innerText = count + "/10";
            scores.push({ row: r, score: count });
        }
        scores.sort((a,b) => b.score - a.score);
        scores.forEach((s, i) => { s.row.querySelector('.res-rank').innerText = (i+1) + "ኛ"; });
    }

    function saveLocal() {
        let date = document.getElementById('qDate').value || "NoDate";
        let cls = document.getElementById('qClass').value;
        localStorage.setItem(`Quiz_${date}_${cls}`, document.body.innerHTML);
        alert(`የ ${cls} ክፍል መረጃ ተቀምጧል!`);
    }

    function shareTxt() {
        let cls = document.getElementById('qClass').value;
        let msg = `🏆 የውጤት ዝርዝር (${cls})\n`;
        let rows = document.getElementById("scoreTable").tBodies[0].rows;
        for (let r of rows) {
            let name = r.querySelector('.st-name').value;
            let score = r.querySelector('.res-total').innerText;
            if(name) msg += `${name}: ${score}\n`;
        }
        navigator.clipboard.writeText(msg).then(() => alert("ውጤቱ ተገልብጧል (Copied)!"));
    }
</script>

</body>
</html>
