<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የውድድር ሰዓት መቁጠሪያ</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .timer-display {
            font-size: 6rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 30px;
            background: white;
            padding: 30px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-family: monospace;
        }
        .controls {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 15px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .start-btn {
            background-color: #27ae60;
            color: white;
        }
        .start-btn:hover { background-color: #219150; transform: translateY(-2px); }
        
        .stop-btn {
            background-color: #e74c3c;
            color: white;
        }
        .stop-btn:hover { background-color: #c0392b; transform: translateY(-2px); }

        h2 { color: #34495e; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>የውድድር ሰዓት</h2>
    <div class="timer-display" id="timer">00:00</div>

    <div class="controls">
        <button class="start-btn" onclick="startCounter()">ጀምር</button>
        <button class="stop-btn" onclick="stopCounter()">አቁም</button>
    </div>

    <script>
        let counter;
        let totalSeconds = 0;
        let isRunning = false;

        function startCounter() {
            if (isRunning) return; // ቀድሞ እየቆጠረ ከሆነ በድጋሚ እንዳይጀምር

            isRunning = true;
            counter = setInterval(() => {
                totalSeconds++;
                
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;

                // ሰዓቱን በ 00:00 ፎርማት ለማሳየት
                const displayMins = minutes < 10 ? '0' + minutes : minutes;
                const displaySecs = seconds < 10 ? '0' + seconds : seconds;

                document.getElementById('timer').textContent = `${displayMins}:${displaySecs}`;
            }, 1000);
        }

        function stopCounter() {
            clearInterval(counter);
            isRunning = false;
        }
    </script>

</body>
</html>
