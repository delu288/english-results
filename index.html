<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - English Result</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #00BFFF; --gold: #FFD700; --dark: #003366;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif; margin: 0;
            background-color: #f0f0f0; background-size: cover;
            background-attachment: fixed; background-position: center;
        }

        /* Nav */
        .nav-header { position: fixed; top: 10px; right: 10px; z-index: 1000; }
        .nav-btn {
            background: var(--gold); color: var(--dark); border: 2px solid var(--dark);
            padding: 5px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.8rem;
        }

        /* Header */
        .main-header {
            text-align: center; padding: 20px; background: rgba(0, 51, 102, 0.85);
            color: white; border-bottom: 4px solid var(--gold);
        }
        .school-title { font-size: 2.2rem; color: var(--primary); margin: 0; text-shadow: 2px 2px #000; }
        .sub-header { font-size: 1.2rem; margin-top: 5px; }
        .eng-tag { color: #ff5722; font-weight: bold; margin-left: 10px; border-left: 2px solid #fff; padding-left: 10px; }

        .container { max-width: 850px; margin: 15px auto; padding: 10px; }

        .card {
            background: var(--glass); backdrop-filter: blur(8px);
            border: 2px solid var(--dark); border-radius: 25px;
            padding: 15px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h4 { margin: 0 0 10px 0; color: var(--dark); border-bottom: 2px solid var(--gold); font-size: 1rem; }

        /* Student Section - Row Layout */
        .student-flex { display: flex; flex-direction: column; gap: 10px; }
        #uName { 
            padding: 12px; font-size: 1.1rem; border-radius: 15px; 
            border: 2px solid var(--primary); width: 100%; box-sizing: border-box; 
        }
        
        .action-row { 
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap; 
        }
        #uGrade { padding: 8px; border-radius: 12px; border: 2px solid var(--primary); flex: 1; }
        .btn-show { 
            padding: 10px 20px; border-radius: 15px; background: var(--dark); 
            color: white; font-weight: bold; cursor: pointer; border: none; 
        }

        /* Mini Result Box (The one you asked for) */
        #resBox {
            flex: 2; min-width: 150px; background: #fffde7; 
            border: 2px dashed var(--gold); border-radius: 15px; 
            padding: 8px; font-size: 0.85rem; display: none; /* Initially hidden */
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        /* Admin/Analysis */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; margin-top: 5px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; font-size: 0.8rem; }
        th { background: var(--dark); color: white; }
        .pct { color: #d32f2f; font-weight: bold; font-size: 0.75rem; display: block; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        .gallery img { width: 100%; height: 90px; object-fit: cover; border-radius: 12px; border: 2px solid var(--gold); }

        .hidden { display: none; }
    </style>
</head>
<body id="mainBody">

    <div class="nav-header">
        <button class="nav-btn" onclick="showPage('userPage')">ተማሪ</button>
        <button class="nav-btn" onclick="showPage('adminPage')">አድሚን</button>
    </div>

    <div class="main-header">
        <h1 class="school-title">ጣይቱ ብጡል አካዳሚ</h1>
        <div class="sub-header">
            <span>መ/ር ደለለኝ አጥላው</span><span class="eng-tag">English</span>
        </div>
    </div>

    <div class="container">
        
        <div id="userPage">
            <div class="card">
                <h4>ውጤት መፈለጊያ</h4>
                <div class="student-flex">
                    <input type="text" id="uName" placeholder="ሙሉ ስምዎን ያስገቡ...">
                    <div class="action-row">
                        <select id="uGrade">
                            <option value="">ክፍል...</option>
                            <option>1ኛ ሀ</option><option>1ኛ ለ</option><option>2ኛ ሀ</option>
                            <option>2ኛ ለ</option><option>3ኛ</option><option>4ኛ</option><option>5ኛ</option><option>6ኛ</option>
                        </select>
                        <button class="btn-show" onclick="searchResult()">አሳይ</button>
                        
                        <div id="resBox">
                            <div id="resContent"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h4>የወላጅ አስተያየት</h4>
                <textarea id="pMsg" placeholder="መልዕክትዎን እዚህ ይፃፉ..." style="width:100%; border-radius:15px; padding:10px; border:2px solid var(--primary); min-height:50px;"></textarea>
                <button class="btn-show" style="background:#4caf50; margin-top:8px;" onclick="sendComment()">ላክ</button>
            </div>

            <div class="card">
                <h4>ጋለሪ</h4>
                <div id="userGal" class="gallery"></div>
            </div>
        </div>

        <div id="adminPage" class="hidden">
            <div id="adminLogin" class="card" style="text-align: center;">
                <input type="password" id="pass" placeholder="Password" style="padding:8px; border-radius:10px; border:1px solid #ccc;">
                <button class="btn-show" onclick="login()">ግባ</button>
            </div>

            <div id="adminDash" class="hidden">
                <div class="card">
                    <h4>መረጃ መጫኛ</h4>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; font-size:0.8rem;">
                        <div>ጀርባ: <input type="file" accept="image/*" onchange="setBg(event)"></div>
                        <div>Excel: <input type="file" id="xlIn" accept=".xlsx, .xls"></div>
                        <div>ጋለሪ: <input type="file" accept="image/*" multiple onchange="upGal(event)"></div>
                    </div>
                </div>

                <div class="card">
                    <h4>ትንተና (ቁጥር እና %)</h4>
                    <select id="stFil" onchange="runStat()" style="margin-bottom:10px;">
                        <option value="all">ሁሉም ክፍሎች</option>
                        <option>1ኛ ሀ</option><option>1ኛ ለ</option><option>2ኛ ሀ</option>
                        <option>2ኛ ለ</option><option>3ኛ</option><option>4ኛ</option><option>5ኛ</option><option>6ኛ</option>
                    </select>
                    <table id="statTable">
                        <thead>
                            <tr><th>ደረጃ</th><th>ወንድ</th><th>ሴት</th><th>ድምር</th></tr>
                        </thead>
                        <tbody id="stBody"></tbody>
                    </table>
                    <div style="margin-top:10px; display:flex; gap:5px;">
                        <button class="btn-show" style="background:#1d6f42; font-size:0.8rem;" onclick="dlExcel()">Excel</button>
                        <button class="btn-show" style="background:#007bff; font-size:0.8rem;" onclick="window.print()">Print</button>
                        <button class="btn-show" style="background:#0088cc; font-size:0.8rem;" onclick="shareReport()">Share</button>
                    </div>
                </div>

                <div class="card">
                    <h4>Inbox</h4>
                    <div id="inbox" style="font-size:0.8rem; max-height:100px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sts = JSON.parse(localStorage.getItem('db_s')) || [];
        let msgs = JSON.parse(localStorage.getItem('db_m')) || [];
        let gals = JSON.parse(localStorage.getItem('db_g')) || [];
        let bg = localStorage.getItem('db_b') || "";

        if(bg) document.body.style.backgroundImage = `url(${bg})`;

        function showPage(p) {
            document.getElementById('userPage').classList.toggle('hidden', p!=='userPage');
            document.getElementById('adminPage').classList.toggle('hidden', p!=='adminPage');
            if(p==='userPage') drawGal();
        }

        function login() {
            if(document.getElementById('pass').value === "Eshet21d") {
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminDash').classList.remove('hidden');
                runStat(); drawInbox();
            } else { alert("Error!"); }
        }

        function setBg(e) {
            let r = new FileReader();
            r.onload = (ev) => { bg = ev.target.result; localStorage.setItem('db_b', bg); document.body.style.backgroundImage = `url(${bg})`; };
            r.readAsDataURL(e.target.files[0]);
        }

        document.getElementById('xlIn').addEventListener('change', function(e) {
            let r = new FileReader();
            r.onload = (ev) => {
                let d = new Uint8Array(ev.target.result);
                let wb = XLSX.read(d, {type:'array'});
                let rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                sts = rows.map(r => ({
                    n: r.Name || r.ስም, s: (String(r.Sex || r.ጾታ || "")).toUpperCase(), g: r.Grade || r.ክፍል,
                    t: (r.Notebook||0)+(r.Quiz1||0)+(r.Quiz2||0)+(r.Mid||0)+(r.Final||0),
                    nt: r.Note || r.አስተያየት
                }));
                localStorage.setItem('db_s', JSON.stringify(sts));
                alert("ተሳክቷል!"); runStat();
            };
            r.readAsArrayBuffer(e.target.files[0]);
        });

        function searchResult() {
            let n = document.getElementById('uName').value.trim();
            let g = document.getElementById('uGrade').value;
            let f = sts.find(s => s.n && s.n.toLowerCase() === n.toLowerCase() && s.g === g);
            let b = document.getElementById('resBox');
            if(f) {
                b.style.display = "block";
                document.getElementById('resContent').innerHTML = `
                    <b>${f.n}</b>: <span style="color:green; font-weight:bold;">${f.t}%</span><br>
                    <small>${f.nt || "በርታ!"}</small>
                `;
            } else { alert("አልተገኘም!"); b.style.display = "none"; }
        }

        function sendComment() {
            let m = document.getElementById('pMsg').value;
            if(!m) return;
            msgs.push({n: document.getElementById('uName').value || "ወላጅ", m, d: new Date().toLocaleString()});
            localStorage.setItem('db_m', JSON.stringify(msgs));
            alert("ተልኳል!"); document.getElementById('pMsg').value = "";
        }

        function runStat() {
            let fil = document.getElementById('stFil').value;
            let d = fil === 'all' ? sts : sts.filter(s => s.g === fil);
            let mTot = d.filter(s => s.s.startsWith('M') || s.s.startsWith('ወ')).length || 1;
            let fTot = d.filter(s => s.s.startsWith('F') || s.s.startsWith('ሴ')).length || 1;
            let gTot = d.length || 1;

            let rs = [{l:"<50", n:0, x:49.9},{l:"50-74", n:50, x:74.9},{l:"75-84", n:75, x:84.9},{l:"85-100", n:85, x:100}];
            document.getElementById('stBody').innerHTML = rs.map(r => {
                let m = d.filter(s => (s.s.startsWith('M')||s.s.startsWith('ወ')) && s.t >= r.n && s.t <= r.x).length;
                let f = d.filter(s => (s.s.startsWith('F')||s.s.startsWith('ሴ')) && s.t >= r.n && s.t <= r.x).length;
                let t = m + f;
                return `<tr><td>${r.l}</td>
                    <td>${m}<span class="pct">(${((m/mTot)*100).toFixed(1)}%)</span></td>
                    <td>${f}<span class="pct">(${((f/fTot)*100).toFixed(1)}%)</span></td>
                    <td>${t}<span class="pct" style="color:green">(${((t/gTot)*100).toFixed(1)}%)</span></td></tr>`;
            }).join('');
        }

        function dlExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("statTable")), "Analysis.xlsx"); }
        function shareReport() {
            let msg = `📊 ሪፖርት:\n`;
            document.querySelectorAll("#stBody tr").forEach(r => { let c = r.querySelectorAll("td"); msg += `🔹 ${c[0].innerText}: ${c[3].innerText.split('(')[0]} ተማሪ\n`; });
            navigator.clipboard.writeText(msg); alert("ኮፒ ተደርጓል!");
        }

        function upGal(e) {
            for(let f of e.target.files) {
                let r = new FileReader();
                r.onload = (ev) => { gals.push(ev.target.result); localStorage.setItem('db_g', JSON.stringify(gals)); drawGal(); };
                r.readAsDataURL(f);
            }
        }

        function drawGal() { document.getElementById('userGal').innerHTML = gals.map(s => `<img src="${s}">`).join(''); }
        function drawInbox() { document.getElementById('inbox').innerHTML = msgs.map(m => `<div style="border-bottom:1px solid #eee; margin-bottom:5px;"><b>${m.n}:</b> ${m.m}</div>`).reverse().join(''); }
        drawGal();
    </script>
</body>
</html>
