<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #00BFFF; --gold: #FFD700; --dark: #003366; --glass: rgba(255, 255, 255, 0.1); --danger: #ff4d4d; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #0f0f0f; color: white; }
        
        .nav-header { position: fixed; top: 10px; right: 10px; z-index: 1000; display: flex; gap: 8px; }
        .nav-btn { background: var(--gold); color: var(--dark); border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .main-header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, #003366 0%, #0f0f0f 100%); border-bottom: 3px solid var(--primary); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.3); }
        th, td { padding: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        th { background: var(--dark); color: var(--gold); }

        .btn-sm { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-edit { background: #ffc107; color: black; }
        .btn-del { background: var(--danger); color: white; }
        .btn-save { background: var(--success); color: white; }

        .hidden { display: none; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 10px; }
        
        .res-display { padding: 30px; border: 2px dashed var(--gold); border-radius: 20px; text-align: center; background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body>

    <div class="nav-header">
        <button class="nav-btn" onclick="showPage('userPage')">ተማሪ</button>
        <button class="nav-btn" onclick="showPage('galleryPage')">ፎቶዎች</button>
        <button class="nav-btn" onclick="showPage('adminPage')">አድሚን</button>
    </div>

    <div class="main-header">
        <h1 style="color:var(--primary); margin:0;">ጣይቱ ብጡል አካዳሚ</h1>
        <div id="ethTime" style="color:var(--gold); margin-top:10px;">---</div>
    </div>

    <div class="container">
        
        <div id="userPage">
            <div class="card">
                <h3 style="color:var(--gold);">የውጤት መፈለጊያ</h3>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <input type="text" id="uName" placeholder="የተማሪ ስም..." style="flex:2;">
                    <select id="uGrade" style="flex:1;">
                        <option value="">ክፍል...</option>
                        <option>1A</option><option>1B</option><option>2A</option><option>2B</option><option>3A</option><option>4A</option><option>5A</option><option>6A</option>
                    </select>
                    <button class="btn-sm btn-save" style="flex:1;" onclick="search()">ውጤት አሳይ</button>
                </div>
                <div id="resBox" class="res-display">ውጤት ለመፈለግ ስም እና ክፍል ያስገቡ</div>
            </div>
        </div>

        <div id="galleryPage" class="hidden">
            <div class="card">
                <h3>የፎቶ ማዕከለ-ስዕላት</h3>
                <div id="photoDisplay" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:15px;"></div>
            </div>
        </div>

        <div id="adminPage" class="hidden">
            <div id="loginBox" class="card" style="max-width:400px; margin:auto; text-align:center;">
                <h3>የአድሚን መግቢያ</h3>
                <input type="password" id="pass" placeholder="Password" style="width:100%;"><br>
                <button class="btn-sm btn-save" style="width:100%;" onclick="login()">ግባ</button>
            </div>

            <div id="adminDash" class="hidden">
                <div class="card">
                    <h3 style="color:var(--gold);">የውጤት ትንተና</h3>
                    <div id="captureArea">
                        <table id="mainTable">
                            <thead>
                                <tr><th>ክፍል</th><th>ድምር</th><th>ያለፉ</th><th>የወደቁ</th></tr>
                            </thead>
                            <tbody id="analysisBody"></tbody>
                        </table>
                    </div>
                    <div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
                        <button class="btn-sm" style="background:#007bff; color:white;" onclick="saveExcel()">💾 Excel</button>
                        <button class="btn-sm" style="background:purple; color:white;" onclick="downloadSample()">📝 Template</button>
                        <button class="btn-sm btn-del" onclick="clearAllData()">🗑️ ሁሉንም ሰርዝ</button>
                    </div>
                </div>

                <div class="card">
                    <h3 style="color:var(--primary);">የተማሪዎች ዝርዝር (Edit/Delete)</h3>
                    <div id="adminStudentList" style="overflow-x:auto;"></div>
                </div>

                <div class="card" style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div>
                        <h4>Excel መጫኛ</h4>
                        <input type="file" id="xlIn" accept=".xlsx, .xls">
                    </div>
                    <div>
                        <h4>ፎቶ መጫኛ</h4>
                        <input type="file" id="imgIn" accept="image/*" multiple>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sts = JSON.parse(localStorage.getItem('db_s')) || [];
        let photos = JSON.parse(localStorage.getItem('db_p')) || [];

        function updateEthTime() {
            const now = new Date();
            document.getElementById('ethTime').innerText = now.toLocaleString('am-ET');
        }
        setInterval(updateEthTime, 1000); updateEthTime();

        function showPage(p) {
            document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(p).classList.remove('hidden');
            if(p === 'galleryPage') renderGallery();
            if(p === 'adminPage' && !document.getElementById('adminDash').classList.contains('hidden')) renderAdminAll();
        }

        function login() {
            if(document.getElementById('pass').value === "Eshet21d") {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminDash').classList.remove('hidden');
                renderAdminAll();
            } else { alert("የይለፍ ቃል ተሳስቷል!"); }
        }

        function renderAdminAll() {
            renderAnalysis();
            renderAdminTable();
        }

        function renderAnalysis() {
            const grades = [...new Set(sts.map(s => s.g))].sort();
            let html = "";
            grades.forEach(g => {
                let d = sts.filter(s => s.g === g);
                let passed = d.filter(s => s.t >= 50).length;
                html += `<tr><td><b>${g}</b></td><td>${d.length}</td><td style="color:var(--success)">${passed}</td><td style="color:var(--danger)">${d.length-passed}</td></tr>`;
            });
            document.getElementById('analysisBody').innerHTML = html || "<tr><td colspan='4'>ዳታ የለም</td></tr>";
        }

        function renderAdminTable() {
            let html = `<table><thead><tr><th>ስም</th><th>ክፍል</th><th>ውጤት</th><th>ድርጊት</th></tr></thead><tbody>`;
            sts.forEach((s, i) => {
                html += `<tr>
                    <td>${s.n}</td><td>${s.g}</td><td>${s.t}%</td>
                    <td>
                        <button class="btn-sm btn-edit" onclick="editStudent(${i})">Edit</button>
                        <button class="btn-sm btn-del" onclick="deleteStudent(${i})">Del</button>
                    </td>
                </tr>`;
            });
            html += "</tbody></table>";
            document.getElementById('adminStudentList').innerHTML = sts.length ? html : "ተማሪ የለም";
        }

        function search() {
            let name = document.getElementById('uName').value.trim().toLowerCase();
            let grade = document.getElementById('uGrade').value.toUpperCase();
            if(!name || !grade) return alert("ስም እና ክፍል ያስገቡ");

            let gradeData = sts.filter(s => s.g === grade).sort((a,b) => b.t - a.t);
            gradeData.forEach((s, i) => s.rank = i + 1);
            let f = gradeData.find(s => s.n.toLowerCase().includes(name));

            let resBox = document.getElementById('resBox');
            if(f) {
                let status = f.t >= 50 ? "ያለፈ ✅" : "ያልለፈ ❌";
                let color = f.t >= 50 ? "var(--success)" : "var(--danger)";
                resBox.innerHTML = `<h2 style="margin:0;">${f.n}</h2>
                                    <h1 style="color:var(--gold); font-size:3rem; margin:10px 0;">${f.t}%</h1>
                                    <div style="color:${color}; font-weight:bold; font-size:1.2rem;">ደረጃ፦ ${f.rank}ኛ | ${status}</div>
                                    <p style="font-style:italic; margin-top:15px;">" ${f.nt} "</p>`;
            } else { resBox.innerHTML = "ውጤት አልተገኘም!"; }
        }

        function editStudent(i) {
            let s = sts[i];
            let nName = prompt("ስም:", s.n);
            let nGrade = prompt("ክፍል:", s.g);
            let nTotal = prompt("ውጤት:", s.t);
            if(nName && nGrade && nTotal) {
                sts[i] = {...s, n: nName, g: nGrade.toUpperCase(), t: Number(nTotal)};
                saveData();
            }
        }

        function deleteStudent(i) {
            if(confirm("ይሰረዝ?")) { sts.splice(i, 1); saveData(); }
        }

        function clearAllData() {
            if(confirm("ሁሉንም የተማሪ ዳታ ማጥፋት ትፈልጋለህ?")) { sts = []; saveData(); }
        }

        function saveData() {
            localStorage.setItem('db_s', JSON.stringify(sts));
            renderAdminAll();
        }

        function downloadSample() {
            const data = [["Name", "Sex", "Grade", "Notebook", "Quiz1", "Quiz2", "Mid", "Final", "Note"], ["Abebe", "M", "1A", 10, 5, 5, 20, 40, "Keep it up!"]];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "Taytu_Template.xlsx");
        }

        document.getElementById('xlIn').addEventListener('change', function(e) {
            let r = new FileReader();
            r.onload = (ex) => {
                let wb = XLSX.read(new Uint8Array(ex.target.result), {type: 'array'});
                let rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                sts = rows.map(r => ({
                    n: (r.Name || "").trim(), g: (r.Grade || "").toString().trim().toUpperCase(),
                    t: (Number(r.Notebook||0)+Number(r.Quiz1||0)+Number(r.Quiz2||0)+Number(r.Mid||0)+Number(r.Final||0)), nt: (r.Note || "በርታ/ቺ!")
                })).filter(s => s.n !== "");
                saveData();
                alert("ተጭኗል!");
            };
            r.readAsArrayBuffer(e.target.files[0]);
        });
        
        function renderGallery() {
            document.getElementById('photoDisplay').innerHTML = photos.length ? photos.map(p => `<img src="${p}" style="width:100%; border-radius:10px; border:2px solid var(--primary);">`).join('') : "ፎቶ የለም";
        }
    </script>
</body>
</html>
