<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - English Result</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #00BFFF; --gold: #FFD700; --dark: #003366;
            --glass: rgba(255, 255, 255, 0.15); 
            --border-thick: 4px solid #00BFFF;
        }

        body {
            font-family: 'Segoe UI', sans-serif; margin: 0;
            background-color: #222; background-size: cover;
            background-attachment: fixed; background-position: center;
            color: white;
        }

        .main-header {
            text-align: center; padding: 20px; 
            background: rgba(0, 51, 102, 0.6);
            border-bottom: var(--border-thick);
            backdrop-filter: blur(8px);
        }
        .school-title { font-size: 2.2rem; color: var(--primary); margin: 0; text-shadow: 2px 2px 5px #000; }

        .nav-header { position: fixed; top: 10px; right: 10px; z-index: 1000; }
        .nav-btn {
            background: var(--gold); color: var(--dark); border: none;
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }

        .container { max-width: 1300px; margin: 20px auto; padding: 10px; }

        .card {
            background: var(--glass); backdrop-filter: blur(12px);
            border: var(--border-thick); border-radius: 30px; 
            padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Top Result Box */
        .result-container {
            width: 100%; border: 2px dashed var(--gold); border-radius: 25px; 
            padding: 30px; text-align: center; background: rgba(255,255,255,0.05);
            margin-bottom: 25px; box-sizing: border-box;
        }

        /* Bottom Grid Side-by-Side */
        .comment-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .comment-section { grid-template-columns: 1fr; } }

        .box-style {
            background: rgba(0,0,0,0.3); border: 1px solid var(--primary);
            border-radius: 20px; padding: 20px; min-height: 150px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .btn-sm { height: 40px; padding: 0 25px; border-radius: 12px; background: var(--dark); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-send { background: #28a745; color: white; border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }

        .hidden { display: none; }
        textarea { width: 100%; height: 70px; margin-top: 10px; border-radius: 10px; padding: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid #444; resize: none; font-family: inherit; }
    </style>
</head>
<body>

    <div class="nav-header no-print">
        <button class="nav-btn" onclick="showPage('userPage')">ተማሪ</button>
        <button class="nav-btn" onclick="showPage('adminPage')">አድሚን</button>
    </div>

    <div class="main-header no-print">
        <h1 class="school-title">ጣይቱ ብጡል አካዳሚ</h1>
        <div style="color: var(--gold); font-weight: bold;">መ/ር ደለለኝ አጥላው // English</div>
    </div>

    <div class="container">
        <div id="userPage">
            <div class="card">
                <h4 style="margin-top:0;">የውጤት መጠየቂያ</h4>
                <div style="display:flex; gap:10px; margin-bottom:25px;">
                    <input type="text" id="uName" placeholder="የተማሪ ሙሉ ስም..." style="flex:2; height:45px; border-radius:12px; padding:0 15px; border:1px solid var(--primary); background:#000; color:#fff;">
                    <select id="uGrade" style="flex:1; border-radius:12px; background:#000; color:#fff; padding: 0 10px;">
                        <option value="">ክፍል...</option>
                        <option>1A</option><option>1B</option><option>2A</option><option>2B</option><option>3A</option><option>4A</option><option>5A</option><option>6A</option>
                    </select>
                    <button class="btn-sm" onclick="search()">አሳይ</button>
                </div>

                <div class="result-container">
                    <div id="resBoxLarge" style="color:var(--gold); font-weight:bold; font-size:1.5rem;">ውጤቱ ለጊዜው ማግኘት አልተቻለም</div>
                </div>

                <div class="comment-section">
                    <div class="box-style">
                        <small style="color:var(--primary); font-weight:bold;">የመምህሩ አስተያየት:</small>
                        <div id="teacherNote" style="color:white; margin-top:15px; font-style:italic; font-size:1.1rem; text-align:center;">--</div>
                    </div>

                    <div class="box-style">
                        <small style="font-weight: bold; color: var(--gold);">የወላጅ አስተያየት መጻፊያ:</small>
                        <textarea id="pMsg" placeholder="አስተያየትዎን እዚህ ይጻፉ..."></textarea>
                        <button class="btn-send" onclick="sendMsg()">አስተያየት ላክ</button>
                    </div>
                </div>
            </div>
            
            <div class="card no-print">
                <h4>ፎቶ ጋለሪ</h4>
                <div id="userGal" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:10px;"></div>
            </div>
        </div>

        <div id="adminPage" class="hidden">
            <div id="loginBox" class="card" style="text-align:center;">
                <input type="password" id="pass" placeholder="Password" style="width:180px; height:40px; text-align:center; border-radius:10px; border:1px solid #444; background:#000; color:#fff;">
                <button class="btn-sm" onclick="login()">ግባ</button>
            </div>
            <div id="adminDash" class="hidden">
                 <div class="card">
                    <p style="text-align:center;">የአድሚን መቆጣጠሪያ (ፋይል መጫኛ እና ሪፖርት ማሳያ)</p>
                    <input type="file" id="xlIn" accept=".xlsx, .xls">
                 </div>
            </div>
        </div>
    </div>

    <script>
        let sts = JSON.parse(localStorage.getItem('db_s')) || [];
        let msgs = JSON.parse(localStorage.getItem('db_m')) || [];
        let gals = JSON.parse(localStorage.getItem('db_g')) || [];

        function showPage(p) {
            document.getElementById('userPage').classList.toggle('hidden', p!=='userPage');
            document.getElementById('adminPage').classList.toggle('hidden', p!=='adminPage');
        }

        function login() {
            if(document.getElementById('pass').value === "Eshet21d") {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminDash').classList.remove('hidden');
            } else { alert("የተሳሳተ የይለፍ ቃል!"); }
        }

        // Search Function
        function search() {
            let n = document.getElementById('uName').value.trim().toLowerCase();
            let g = document.getElementById('uGrade').value;
            let res = document.getElementById('resBoxLarge');
            let note = document.getElementById('teacherNote');

            let f = sts.find(s => s.n.toLowerCase() === n && s.g.toUpperCase().includes(g));
            
            if(f) {
                res.innerHTML = `<span style="color:white;">ተማሪ፡ ${f.n}</span><br>ውጤት፡ ${f.t}%`;
                note.innerHTML = f.nt;
            } else {
                res.innerHTML = "ውጤቱ ለጊዜው ማግኘት አልተቻለም";
                note.innerHTML = "--";
            }
        }

        // Send Comment
        function sendMsg() {
            let n = document.getElementById('uName').value.trim();
            let g = document.getElementById('uGrade').value;
            let m = document.getElementById('pMsg').value.trim();
            if(!n || !g || !m) { alert("እባክዎ መጀመሪያ ስምዎን ያስገቡ እና አስተያየት ይጻፉ!"); return; }
            msgs.push({ n, g, dt: new Date().toLocaleString('am-ET'), m });
            localStorage.setItem('db_m', JSON.stringify(msgs));
            document.getElementById('pMsg').value = ""; 
            alert("አስተያየትዎ ተልኳል!");
        }

        // Excel Loader
        document.getElementById('xlIn').addEventListener('change', function(e) {
            let r = new FileReader();
            r.onload = (ex) => {
                let wb = XLSX.read(new Uint8Array(ex.target.result), {type:'array'});
                let rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                sts = rows.map(i => ({
                    n: String(i.Name || i.ስም || "").trim(), 
                    g: String(i.Grade || ""),
                    t: (Number(i.Notebook||0)+Number(i.Quiz1||0)+Number(i.Quiz2||0)+Number(i.Mid||0)+Number(i.Final||0)),
                    nt: i.Note || "በርታ/ቺ!"
                }));
                localStorage.setItem('db_s', JSON.stringify(sts));
                alert("ዳታው ተጭኗል!");
            };
            r.readAsArrayBuffer(e.target.files[0]);
        });
    </script>
</body>
</html>
