<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የጥያቄና መልስ ውድድር ውጤት መያዣ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 10px; font-size: 12px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        .timer-section { text-align: center; background: #eef; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        #timer-display { font-size: 2rem; font-weight: bold; color: #d9534f; }
        
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .date-box { border: 1px solid #333; padding: 5px; border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th, td { border: 1px dotted #888; padding: 4px; text-align: center; overflow: hidden; }
        th { background-color: #007bff; color: white; font-size: 11px; }
        .sub-head { background-color: #e9ecef; color: #333; font-size: 10px; }

        input[type="text"], input[type="number"] { width: 95%; border: none; background: transparent; text-align: center; font-size: 11px; }
        select { border: none; background: #f9f9f9; cursor: pointer; font-weight: bold; width: 100%; }
        
        .correct { color: green; font-weight: bold; }
        .wrong { color: red; font-weight: bold; }

        .footer-sigs { margin-top: 30px; display: flex; justify-content: space-between; }
        .sig-box { width: 45%; line-height: 2; }
        .final-actions { text-align: center; margin-top: 30px; border-top: 2px solid #333; padding-top: 15px; }
        .btn { padding: 8px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }

        @media print {
            .timer-section, .final-actions, .add-btn-container { display: none; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; width: 100%; max-width: 100%; }
            th { background-color: #ddd !important; color: black; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>የጥያቄና መልስ ውድድር ውጤት መያዣ</h2>

    <div class="timer-section">
        <div id="timer-display"></div>
        <button class="btn" style="background:#f0ad4e" onclick="setTimer(1)">1 ደቂቃ</button>
        <button class="btn" style="background:#f0ad4e" onclick="setTimer(2)">2 ደቂቃ</button>
        <button class="btn" style="background:#5cb85c; color:white" onclick="startTimer()">ጀምር</button>
        <button class="btn" style="background:#d9534f; color:white" onclick="stopTimer()">ቁም</button>
    </div>

    <div class="info-grid">
        <div class="date-box">ቀን፡ <input type="date"></div>
        <div class="date-box">ክፍል፡ <input type="text" placeholder="ክፍል..."></div>
        <div class="date-box">ሴሚስተር፡ <input type="text" placeholder="ሴሚስተር..."></div>
    </div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th rowspan="2" style="width: 30px;">ቁጥር</th>
                <th rowspan="2" style="width: 120px;">የተወዳዳሪዎች ስም</th>
                <th colspan="3">አማርኛ</th>
                <th colspan="3">እንግሊዝኛ</th>
                <th colspan="3">ሒሳብ</th>
                <th colspan="3">አ/ሳይንስ</th>
                <th colspan="3">ግብረገብ</th>
                <th rowspan="2">የተመለሰ</th>
                <th rowspan="2">ያልተመለሰ</th>
                <th rowspan="2">ድምር</th>
                <th rowspan="2">ደረጃ</th>
            </tr>
            <tr class="sub-head">
                <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
                <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
                <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
                <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
                <th>እጣ</th><th>1ኛ</th><th>2ኛ</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td><input type="text" class="student-name"></td>
                <td><input type="text"></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                <td><input type="text"></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                <td><input type="text"></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                <td><input type="text"></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                <td><input type="text"></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
                
                <td class="total-correct">0</td>
                <td class="total-wrong">0</td>
                <td class="grand-total">0</td>
                <td class="rank">-</td>
            </tr>
        </tbody>
    </table>

    <div class="add-btn-container" style="margin-top: 10px;">
        <button class="btn" style="background:#007bff; color:white;" onclick="addRow()">+ ተማሪ ጨምር</button>
    </div>

    <div class="footer-sigs">
        <div class="sig-box">
            1ኛ ዳኛ፡ _________________<br>
            2ኛ ዳኛ፡ _________________
        </div>
        <div class="sig-box">
            ሰብሳቢ፡ <b>መ/ር ደለለኝ አጥላው</b><br>
            ፀሀፊ፡ <b>መ/ርት መሰረት ፋንታ</b>
        </div>
    </div>

    <div class="final-actions">
        <button class="btn" style="background:#28a745; color:white;">💾 Save</button>
        <button class="btn" style="background:#17a2b8; color:white;" onclick="window.print()">🖨️ Print</button>
        <button class="btn" style="background:#6f42c1; color:white;" onclick="shareResults()">🔗 Share</button>
    </div>
</div>

<script>
    let timerInterval;
    let timeLeft = 0;

    function updateDisplay() {
        if (timeLeft <= 0 && !timerInterval) { document.getElementById('timer-display').innerText = ""; return; }
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer-display').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function setTimer(m) { timeLeft = m * 60; updateDisplay(); }
    function startTimer() {
        if (timeLeft <= 0) return;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timeLeft > 0) { timeLeft--; updateDisplay(); }
            else { clearInterval(timerInterval); timerInterval = null; alert("ጊዜው አልቋል!"); }
        }, 1000);
    }
    function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

    function addRow() {
        let table = document.getElementById("resultsTable").getElementsByTagName('tbody')[0];
        let rowCount = table.rows.length;
        let row = table.insertRow(rowCount);
        row.innerHTML = `<td>${rowCount + 1}</td>
            <td><input type="text" class="student-name"></td>
            <td><input type="text"></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td><input type="text"></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td><input type="text"></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td><input type="text"></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td><input type="text"></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td><select class="q-score" onchange="calculate()"><option value="0">-</option><option value="1">✓</option><option value="x">X</option></select></td>
            <td class="total-correct">0</td><td class="total-wrong">0</td><td class="grand-total">0</td><td class="rank">-</td>`;
    }

    function calculate() {
        let rows = document.getElementById("resultsTable").getElementsByTagName('tbody')[0].rows;
        let rankData = [];

        for (let i = 0; i < rows.length; i++) {
            let selects = rows[i].getElementsByClassName('q-score');
            let correct = 0;
            let wrong = 0;

            for (let s of selects) {
                if (s.value === "1") { correct++; s.className = "q-score correct"; }
                else if (s.value === "x") { wrong++; s.className = "q-score wrong"; }
                else { s.className = "q-score"; }
            }

            rows[i].getElementsByClassName('total-correct')[0].innerText = correct;
            rows[i].getElementsByClassName('total-wrong')[0].innerText = wrong;
            rows[i].getElementsByClassName('grand-total')[0].innerText = correct; // ድምሩ የተመለሰ ብዛት ነው
            rankData.push({ index: i, score: correct });
        }

        // ደረጃ ማውጣት
        rankData.sort((a, b) => b.score - a.score);
        rankData.forEach((item, idx) => {
            if (item.score >= 0) rows[item.index].getElementsByClassName('rank')[0].innerText = idx + 1;
        });
    }

    function shareResults() {
        let text = "የውድድር ውጤት ዝርዝር:\n";
        let rows = document.getElementById("resultsTable").getElementsByTagName('tbody')[0].rows;
        for (let row of rows) {
            let name = row.querySelector('.student-name').value || "---";
            let correct = row.querySelector('.total-correct').innerText;
            text += `${name}: የተመለሰ=${correct}\n`;
        }
        navigator.clipboard.writeText(text).then(() => alert("ውጤቱ ተገልብጧል!"));
    }
</script>

</body>
</html>
