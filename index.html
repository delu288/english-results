<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ውጤት መፈለጊያ - ጣይቱ ብጡል አካዳሚ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a2a6c; --gold: #b8860b; --bg: #f8f9fd; }
        body { font-family: 'Poppins', 'Noto Sans Ethiopic', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 550px; width: 100%; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); text-align: center; }
        
        .upload-section { background: #fff8e1; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px dashed var(--gold); }
        input[type="file"] { margin-top: 10px; font-size: 13px; }
        
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; text-align: center; }
        .btn-main { background: var(--gold); color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; font-size: 17px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main:hover { background: #966d09; }

        #result-card { display: none; margin-top: 30px; padding: 20px; border-radius: 15px; background: #f1f3f8; border-left: 5px solid var(--primary); text-align: left; }
        .res-item { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .res-label { font-weight: bold; color: var(--primary); }
        .score-val { color: #27ae60; font-weight: bold; font-size: 22px; }

        .btn-send { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        footer { margin-top: 40px; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); font-size: 24px;">ጣይቱ ብጡል አካዳሚ</h1>
    
    <div class="upload-section">
        <label style="font-weight: bold; font-size: 14px;">1. የተማሪዎች ዝርዝር ፋይል (CSV) ይጫኑ</label><br>
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <hr>

    <div style="margin-top: 20px;">
        <label style="font-weight: bold; display: block; margin-bottom: 10px;">2. የተማሪውን ሙሉ ስም ጽፈው ይፈልጉ</label>
        <input type="text" id="nameSearch" placeholder="ለምሳሌ፡ አበበ ከበደ">
        <button class="btn-main" onclick="searchStudent()">ውጤት አሳይ</button>
    </div>

    <div id="result-card">
        <div class="res-item"><span class="res-label">ተማሪ፦</span> <span id="outName"></span></div>
        <div class="res-item"><span class="res-label">ክፍል፦</span> <span id="outGrade"></span></div>
        <div class="res-item"><span class="res-label">ውጤት፦</span> <span id="outScore" class="score-val"></span></div>
        <div class="res-item"><span class="res-label">የመምህር አስተያየት፦</span> <p id="outComment" style="font-style: italic;"></p></div>
        
        <textarea id="p_msg" rows="2" style="width:100%; margin-top:10px; border-radius:8px; padding:8px;" placeholder="ለወላጅ አስተያየት..."></textarea>
        <button class="btn-send" onclick="sendToTelegram()">አስተያየቱን ለባለቤቱ ላክ</button>
    </div>

    <p id="error" style="color: red; display: none; margin-top: 15px;">ይቅርታ፣ ስሙ በፋይሉ ውስጥ አልተገኘም።</p>

    <footer>መ/ር ደለለኝ አጥላው | ጣይቱ ብጡል አካዳሚ 2018 ዓ.ም</footer>
</div>

<script>
    let studentList = [];

    // ፋይሉን የማንበብ ተግባር
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            processData(text);
        };
        reader.readAsText(file);
    });

    function processData(csvText) {
        const lines = csvText.split('\n');
        studentList = lines.slice(1).map(line => {
            const columns = line.split(',');
            if(columns.length >= 4) {
                return {
                    name: columns[0].trim(),
                    grade: columns[1].trim(),
                    score: columns[2].trim(),
                    comment: columns[3].trim()
                };
            }
        }).filter(item => item !== undefined);
        alert("የተማሪዎች ፋይል በተሳካ ሁኔታ ተጭኗል!");
    }

    function searchStudent() {
        const searchName = document.getElementById('nameSearch').value.trim();
        const student = studentList.find(s => s.name === searchName);
        const card = document.getElementById('result-card');
        const err = document.getElementById('error');

        if(student) {
            document.getElementById('outName').innerText = student.name;
            document.getElementById('outGrade').innerText = student.grade;
            document.getElementById('outScore').innerText = student.score;
            document.getElementById('outComment').innerText = student.comment;
            card.style.display = "block";
            err.style.display = "none";
        } else {
            card.style.display = "none";
            err.style.display = "block";
        }
    }

    function sendToTelegram() {
        const token = "8608778734:AAGQpZ3yKghv7HQJxjo7SJVH6WqH5-Y5JD4";
        const chat_id = "7387771308";
        const name = document.getElementById('outName').innerText;
        const msg = document.getElementById('p_msg').value;

        if(!msg) { alert("አስተያየት ይፃፉ!"); return; }

        const telegramMsg = `👪 የወላጅ አስተያየት\n👤 ተማሪ፦ ${name}\n💬 መልእክት፦ ${msg}`;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(telegramMsg)}`)
        .then(() => alert("አስተያየትዎ ተልኳል!"));
    }
</script>

</body>
</html>
